        if (local.length) {
          text += `${local.length === 1 ? local[0].contact.name + " ist" : local.slice(0,2).map(r=>r.contact.name).join(" und ") + " sind"} direkt vor Ort und eignen sich für einen persönlichen Termin. `;
        }
        if (elsewhere.length) {
          text += `Darüber hinaus haben ${elsewhere.length === 1 ? elsewhere[0].contact.name : `${elsewhere.length} weitere Kontakte`} inhaltlich relevante Verbindungen zu ${cap}, auch wenn sie nicht dort ansässig sind. `;
        }
        text += `Insgesamt wurden ${n} relevante Kontakte in deinem Netzwerk gefunden. Kurze Vorab-Meldung vor der Reise erhöht die Chance auf ein spontanes Treffen deutlich.`;
        return text;
      }

      // ── Knowledge / expertise intent ─────────────────────────────────────────
      const knowMatch = ["know-how","expertise","wissen","kompetenz","experte","fachmann","beratung","rat","hilfe","kenntnisse","erfahrung","spezialist"].some(w => qt.includes(w));
      if (knowMatch) {
        const topics = tokenize(queryText).filter(t => !["know","how","brauche","suche","jemanden"].includes(t));
        const topicStr = topics.slice(0,2).join(", ");
        let text = `Für ${topicStr ? `fachliche Fragen rund um "${topicStr}"` : "diesen Wissensbereich"} lohnt es sich, gezielt auf Personen mit einschlägiger Berufserfahrung oder thematisch passenden Tags zuzugehen. `;
        text += `Ein kurzes, informelles Gespräch – per Call oder bei einem Kaffee – reicht oft aus, um den richtigen Impuls zu bekommen. `;
        text += `${n} Kontakte aus deinem Netzwerk wurden als potenziell relevant eingestuft. `;
        text += `${topStr} ${n === 1 ? "sticht" : "stechen"} dabei am deutlichsten hervor – ein direkter und konkreter Austausch ist hier am vielversprechendsten.`;
        return text;
      }

      // ── Introduction / connection intent ─────────────────────────────────────
      const introMatch = ["intro","vorstellen","verbindung","vernetzt","kennt","kontakt zu","zugang zu","tür öffnen"].some(w => qt.includes(w));
      if (introMatch) {
        let text = `Warme Empfehlungen über bestehende Kontakte wirken deutlich besser als Kaltansprachen – das gilt besonders, wenn du Zugang zu einer bestimmten Person oder Branche suchst. `;
        text += `Aus deinem Netzwerk gibt es ${n} Kontakte, die thematisch oder strukturell eine Brücke bilden könnten. `;
        text += `${topStr} ${top.length === 1 ? "hat" : "haben"} die stärkste Überlappung mit deiner Anfrage. `;
        text += `Ein persönliches Gespräch vorab – in dem du dein Anliegen klar formulierst – erhöht die Bereitschaft zur Vermittlung erheblich.`;
        return text;
      }

      // ── Job / career intent ───────────────────────────────────────────────────
      const jobMatch = ["job","stelle","karriere","bewerbung","wechsel","arbeit","position","recruiter"].some(w => qt.includes(w));
      if (jobMatch) {
        let text = `Karriereschritte werden häufig über Netzwerkgespräche angebahnt – lange bevor eine Stelle öffentlich ausgeschrieben wird. `;
        text += `${n} Kontakte in deinem Netzwerk könnten hier relevant sein, sei es als direkte Ansprechperson, als Türöffner oder als Marktkenner. `;
        text += `Besonders ${topStr} ${top.length === 1 ? "erscheint" : "erscheinen"} aufgrund von Rolle oder Branche vielversprechend. `;
        text += `Ein lockeres Informationsgespräch – ohne konkreten Bewerbungsdruck – ist der wirksamste Einstieg.`;
        return text;
      }

      // ── Collaboration / project intent ────────────────────────────────────────
      const collabMatch = ["projekt","zusammenarbeit","kooperieren","partner","team","gemeinsam","startup"].some(w => qt.includes(w));
      if (collabMatch) {
        let text = `Für eine erfolgreiche Zusammenarbeit zählt neben fachlicher Passung vor allem das gegenseitige Vertrauen – und das entsteht am besten aus einem bestehenden Netzwerk heraus. `;
        text += `${n} Kontakte in deiner Stakeholder-Map weisen eine thematische Übereinstimmung mit deiner Anfrage auf. `;
        text += `${topStr} ${top.length === 1 ? "kommt" : "kommen"} dabei als mögliche${top.length === 1 ? "r" : ""} Mitstreiter${top.length === 1 ? "" : "innen"} oder Sparringspartner in Frage. `;
        text += `Ein erstes exploratives Gespräch hilft, Interessenlage und Kapazitäten zu klären.`;
        return text;
      }

      // ── Generic fallback ──────────────────────────────────────────────────────
      let text = `Basierend auf deiner Anfrage wurden ${n} Kontakte aus deinem Netzwerk identifiziert, die eine inhaltliche Überschneidung aufweisen. `;
      text += `Die Relevanzbewertung berücksichtigt Tags, Rolle, Firma, Wohnort und Notizen. `;
      text += `${topStr} ${top.length === 1 ? "erzielt" : "erzielen"} die höchsten Matching-Werte und ${top.length === 1 ? "wäre" : "wären"} der empfohlene Ausgangspunkt für eine gezielte Kontaktaufnahme.`;
      return text;
    };

    // ─── SmartQuery Component ─────────────────────────────────────────────────
    const SmartQuery = ({ contacts }) => {
      const STORAGE_KEY = "sm_queries_v1";
      const [input, setInput] = React.useState("");
      const [results, setResults] = React.useState(null);
      const [planHint, setPlanHint] = React.useState(null);
      const [currentQuery, setCurrentQuery] = React.useState("");
      const [savedQueries, setSavedQueries] = React.useState(() => {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; }
      });
      const [saveName, setSaveName] = React.useState("");
      const [showSaveInput, setShowSaveInput] = React.useState(false);
      const [expanded, setExpanded] = React.useState(false);

      const handleRun = (text) => {
        const q = text || input;
        if (!q.trim()) return;
        const res = runQuery(q, contacts);
        const hint = getContextualAnswer(q, res);
        setCurrentQuery(q);
        setResults(res);
        setPlanHint(hint);
        setExpanded(true);
        setSaveName(q.slice(0, 40));
      };

      const handleSave = () => {
        if (!saveName.trim() || results === null) return;
        const entry = {
          id: Date.now().toString(),
          name: saveName.trim(),
          query: currentQuery,
          createdAt: new Date().toISOString(),
          resultCount: results.length,
        };
        const updated = [entry, ...savedQueries].slice(0, 20);
        setSavedQueries(updated);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
        setShowSaveInput(false);
        setSaveName("");
      };

      const handleDelete = (id) => {
        const updated = savedQueries.filter(q => q.id !== id);
        setSavedQueries(updated);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
      };

      const handleExport = () => {
        if (!results) return;
        const payload = {
          query: currentQuery,
          exportedAt: new Date().toISOString(),
          planHint,
          results: results.map(r => ({
            name: r.contact.name,
            rolle: r.contact.rolle,
            firma: r.contact.firma,
            wohnort: r.contact.wohnort,
            arbeitsort: r.contact.arbeitsort,
            tags: r.contact.tags,
            relevanzScore: r.score,
            gruende: r.reasons,
            naechsteAktion: r.contact.naechsteAktion,
            email: r.contact.email,
            telefon: r.contact.telefon,
          })),
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `smartquery_${currentQuery.slice(0,20).replace(/\s+/g,"_")}_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      return (
        <div className="bg-white border rounded-2xl overflow-hidden" style={{borderColor:"#b2dde8"}}>
          {/* Header bar */}
          <div
            className="flex items-center justify-between px-5 py-4 cursor-pointer select-none"
            style={{background:"linear-gradient(135deg,#f0f8fa 0%,#e5f3f7 100%)"}}
            onClick={() => setExpanded(e => !e)}
          >
            <div className="flex items-center gap-2.5">
              <span className="text-xl">🔍</span>
              <div>
                <p className="font-bold text-sm" style={{color:"#1e4d5c"}}>SmartQuery</p>
                <p className="text-xs" style={{color:"#5baec3"}}>Kontextueller Netzwerk-Scout</p>
              </div>
            </div>
            <div className="flex items-center gap-3">
              {results !== null && (
                <span className="text-xs font-semibold px-2.5 py-1 rounded-full" style={{background:"#d9eef4",color:"#2d7a93"}}>
                  {results.length} Treffer
                </span>
              )}
              <span className="text-gray-400 text-sm">{expanded ? "▲" : "▼"}</span>
            </div>
          </div>

          {expanded && (
            <div className="px-5 pb-5 pt-4 space-y-4">
              {/* Input row */}
              <div className="flex gap-2">
                <input
                  className="flex-1 border rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2"
                  style={{borderColor:"#b2dde8", "--tw-ring-color":"#5baec3"}}
                  placeholder={"z.B. Ich fahre nach Stuttgart oder Ich brauche Finanz-Know-how"}
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => e.key==="Enter" && handleRun()}
                />
                <button
                  onClick={() => handleRun()}
                  className="px-4 py-2.5 rounded-xl text-sm font-semibold text-white flex-shrink-0"
                  style={{background:"#2d7a93"}}
                >Suchen</button>
              </div>

              {/* Saved queries */}
              {savedQueries.length > 0 && (
                <div>
                  <p className="text-xs font-semibold uppercase tracking-wide mb-2" style={{color:"#5baec3"}}>
                    Gespeicherte Abfragen
                  </p>
                  <div className="flex flex-wrap gap-2">
                    {savedQueries.map(sq => (
                      <div key={sq.id} className="flex items-center gap-1 rounded-lg px-2.5 py-1 text-xs font-medium group"
                        style={{background:"#f0f8fa",border:"1px solid #b2dde8",color:"#25606f"}}>
                        <button
                          className="hover:underline"
                          onClick={() => { setInput(sq.query); handleRun(sq.query); }}
                        >{sq.name}</button>
                        <button
                          className="text-gray-300 hover:text-red-400 ml-1 opacity-0 group-hover:opacity-100 transition-opacity"
                          onClick={() => handleDelete(sq.id)}
                        >×</button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Results */}
              {results !== null && (
                <div className="space-y-4">
                  {/* Contextual answer block */}
                  {planHint && (
                    <div className="rounded-xl px-5 py-4"
                      style={{background:"linear-gradient(135deg,#e5f3f7 0%,#f0f8fa 100%)",border:"1px solid #b2dde8"}}>
                      <div className="flex items-center gap-2 mb-2">
                        <span className="text-sm font-bold" style={{color:"#1e4d5c"}}>Einschätzung</span>
                        <span className="text-xs px-2 py-0.5 rounded-full font-semibold" style={{background:"#d9eef4",color:"#25606f"}}>
                          {results.length} {results.length === 1 ? "Treffer" : "Treffer"}
                        </span>
                      </div>
                      <p className="text-sm leading-relaxed" style={{color:"#25606f"}}>{planHint}</p>
                    </div>
                  )}

                  {results.length === 0 ? (
                    <p className="text-center text-gray-400 text-sm py-4">Keine Treffer — versuche andere Begriffe.</p>
                  ) : (
                    <>
                      <p className="text-xs font-semibold uppercase tracking-wide" style={{color:"#5baec3"}}>Passende Kontakte</p>
                      <div className="space-y-2 overflow-y-auto" style={{maxHeight:"300px"}}>
                        {results.map((r, i) => (
                          <div key={r.contact.id}
                            className="rounded-xl p-3 border flex items-start gap-3"
                            style={{borderColor:"#dde8ec",background:i===0?"#f0f8fa":"#fff"}}>
                            <span className="text-sm font-black w-6 flex-shrink-0 pt-0.5" style={{color:"#5baec3"}}>
                              {i===0?"①":i===1?"②":i===2?"③":`${i+1}`}
                            </span>
                            <div className="flex-1 min-w-0">
                              <p className="font-semibold text-sm text-gray-800">{r.contact.name}</p>
                              <p className="text-xs text-gray-400 truncate">{[r.contact.rolle,r.contact.firma].filter(Boolean).join(" · ")}</p>
                              {r.reasons.length > 0 && (
                                <div className="flex flex-wrap gap-1 mt-1.5">
                                  {r.reasons.map((reason, j) => (
                                    <span key={j} className="text-xs px-1.5 py-0.5 rounded-md font-medium"
                                      style={{background:"#d9eef4",color:"#25606f"}}>
                                      {reason}
                                    </span>
                                  ))}
                                </div>
                              )}
                            </div>
                            <div className="text-right flex-shrink-0">
                              <span className="text-xs font-bold px-2 py-0.5 rounded-full"
                                style={{background:"#1e4d5c",color:"#fff"}}>
                                {r.score.toFixed(1)}
                              </span>
                            </div>
                          </div>
                        ))}
                      </div>

                      {/* Action bar */}
                      <div className="flex items-center gap-2 pt-1">
                        {!showSaveInput ? (
                          <button
                            onClick={() => setShowSaveInput(true)}
                            className="text-xs font-semibold px-3 py-1.5 rounded-lg border"
                            style={{color:"#2d7a93",borderColor:"#b2dde8",background:"#f0f8fa"}}
                          >💾 Abfrage speichern</button>
                        ) : (
                          <div className="flex gap-1.5 flex-1">
                            <input
                              className="flex-1 border rounded-lg px-3 py-1.5 text-xs outline-none focus:ring-1"
                              style={{borderColor:"#b2dde8"}}
                              placeholder="Name für diese Abfrage…"
                              value={saveName}
                              onChange={e => setSaveName(e.target.value)}
                              onKeyDown={e => { if(e.key==="Enter") handleSave(); if(e.key==="Escape") setShowSaveInput(false); }}
                              autoFocus
                            />
                            <button onClick={handleSave}
                              className="px-3 py-1.5 text-xs font-semibold rounded-lg text-white"
                              style={{background:"#2d7a93"}}>OK</button>
                            <button onClick={() => setShowSaveInput(false)}
                              className="px-3 py-1.5 text-xs text-gray-400 rounded-lg hover:bg-gray-100">✕</button>
                          </div>
                        )}
                        <button
                          onClick={handleExport}
                          className="text-xs font-semibold px-3 py-1.5 rounded-lg border ml-auto"
                          style={{color:"#25606f",borderColor:"#b2dde8",background:"#f0f8fa"}}
                        >⬇ JSON Export</button>
                      </div>
                    </>
                  )}
                </div>
              )}
            </div>
          )}
        </div>
      );
    };

    // ─── Dashboard View ──────────────────────────────────────────────────────
    const DashboardView = ({ contacts, onEdit, onUpdate }) => {
      const total = contacts.length;
      const highPrio = contacts.filter(c => c.prioritaet==="hoch").length;
      const avgScore = total ? Math.round(contacts.reduce((a,c)=>a+(c.score||0),0)/total) : 0;
      const overdue = contacts.filter(c => {
        if (!c.letzterKontakt) return c.prioritaet==="hoch";
        return Math.floor((new Date()-new Date(c.letzterKontakt))/86400000)>90;
      }).length;
      const topContacts = [...contacts].sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,6);
      const withActions = contacts.filter(c => c.naechsteAktion);
      const needAttn = [...contacts]
        .filter(c => { if(c.prioritaet!=="hoch") return false; const d=c.letzterKontakt?Math.floor((new Date()-new Date(c.letzterKontakt))/86400000):999; return d>60; })
        .sort((a,b) => { const da=a.letzterKontakt?Math.floor((new Date()-new Date(a.letzterKontakt))/86400000):9999; const db=b.letzterKontakt?Math.floor((new Date()-new Date(b.letzterKontakt))/86400000):9999; return db-da; })
        .slice(0,5);

      // City distribution
      const cityCounts = {};
      contacts.forEach(c => {
        if (c.wohnort) cityCounts[c.wohnort] = (cityCounts[c.wohnort]||0)+1;
      });
      const topCities = Object.entries(cityCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

      // ── Action handlers ────────────────────────────────────────────────────
      const completeAction = (c) => {
        const now = new Date();
        const updated = {
          ...c,
          naechsteAktion: "",
          letzterKontakt: now.toISOString().slice(0,10),
          kontakthistorie: [
            { datum: now.toISOString(), text: `✓ Erledigt: ${c.naechsteAktion}` },
            ...(c.kontakthistorie||[])
          ],
        };
        updated.score = calculateScore(updated);
        onUpdate(updated);
      };

      const skipAction = (c) => {
        const updated = { ...c, naechsteAktion: "" };
        updated.score = calculateScore(updated);
        onUpdate(updated);
      };

      const markContacted = (c) => {
        const now = new Date();
        const updated = {
          ...c,
          letzterKontakt: now.toISOString().slice(0,10),
          kontakthistorie: [
            { datum: now.toISOString(), text: "Kontakt aufgenommen (Dashboard)" },
            ...(c.kontakthistorie||[])
          ],
        };
        updated.score = calculateScore(updated);
        onUpdate(updated);
      };

      const kpis=[
        {label:"Kontakte gesamt",value:total,icon:"👥",bg:"from-blue-50 to-indigo-50 border-blue-100"},
        {label:"Hohe Priorität",value:highPrio,icon:"🔥",bg:"from-red-50 to-pink-50 border-red-100"},
        {label:"Ø Score",value:avgScore,icon:"⭐",bg:"from-amber-50 to-yellow-50 border-amber-100"},
        {label:"Kontakt überfällig",value:overdue,icon:"⚠️",bg:"from-orange-50 to-amber-50 border-orange-100"},
      ];

      return (
        <div className="space-y-6">
          {/* ── SmartQuery ─────────────────────────────────────────────────── */}
          <SmartQuery contacts={contacts} />

          <div className="grid gap-3" style={{gridTemplateColumns:"repeat(auto-fill,minmax(min(100%,160px),1fr))"}}>
            {kpis.map(k => (
              <div key={k.label} className={`bg-gradient-to-br ${k.bg} border rounded-2xl p-5`}>
                <div className="text-3xl mb-2">{k.icon}</div>
                <div className="text-4xl font-black text-gray-800">{k.value}</div>
                <div className="text-xs text-gray-500 mt-1 font-medium">{k.label}</div>
              </div>
            ))}
          </div>

          <div className="grid gap-4" style={{gridTemplateColumns:"repeat(auto-fill,minmax(min(100%,320px),1fr))"}}>
            <GamificationCard contacts={contacts} />
            <div className="bg-white border rounded-2xl p-6">
              <h3 className="font-bold text-gray-800 mb-4">🏆 Top-Kontakte nach Score</h3>
              {topContacts.length===0?<p className="text-gray-300 text-sm text-center py-8">Keine Kontakte</p>:(
                <div className="space-y-2">
                  {topContacts.map((c,i) => (
                    <div key={c.id} onClick={() => onEdit(c)}
                      className="flex items-center gap-3 cursor-pointer hover:bg-gray-50 rounded-xl p-2.5 -mx-2">
                      <span className="text-sm font-black w-7">{i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`}</span>
                      <div className="flex-1 min-w-0">
                        <p className="font-semibold text-sm text-gray-800 truncate">{c.name}</p>
                        <p className="text-xs text-gray-400 truncate">{[c.rolle,c.firma].filter(Boolean).join(" · ")}</p>
                      </div>
                      {c.prioritaet && <span className={`text-xs px-2 py-0.5 rounded-full border font-semibold ${PRIO_STYLE[c.prioritaet]}`}>{c.prioritaet}</span>}
                      <ScoreBadge score={c.score||0} />
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="bg-white border rounded-2xl p-6">
              <h3 className="font-bold text-gray-800 mb-4">⚠️ Brauchen Aufmerksamkeit</h3>
              {needAttn.length===0?(
                <div className="text-center py-8"><div className="text-4xl mb-2">✅</div><p className="text-gray-400 text-sm">Alle wichtigen Kontakte sind aktuell!</p></div>
              ):(
                <div className="space-y-2">
                  {needAttn.map(c => {
                    const d=c.letzterKontakt?Math.floor((new Date()-new Date(c.letzterKontakt))/86400000):null;
                    return (
                      <div key={c.id} className="flex items-center gap-2 rounded-xl p-2.5 -mx-2 hover:bg-gray-50 transition-colors group">
                        <div className={`w-2.5 h-2.5 rounded-full flex-shrink-0 ${PRIO_DOT[c.prioritaet]}`} />
                        {/* Clickable name area */}
                        <div className="flex-1 min-w-0 cursor-pointer" onClick={() => onEdit(c)}>
                          <p className="font-semibold text-sm text-gray-800 truncate">{c.name}</p>
                          <p className="text-xs font-medium" style={{color:d&&d>180?"#ef4444":"#f59e0b"}}>
                            {d?`Vor ${d} Tagen kontaktiert`:"Noch nie kontaktiert"}
                          </p>
                        </div>
                        <Stars value={c.beziehungsstaerke||1} readonly={true} />
                        {/* Quick "Jetzt kontaktiert" button */}
                        <button
                          onClick={() => markContacted(c)}
                          title="Jetzt als kontaktiert markieren"
                          className="opacity-0 group-hover:opacity-100 transition-opacity text-xs font-semibold px-2.5 py-1 rounded-lg flex-shrink-0"
                          style={{background:"#f0f8fa",color:"#2d7a93",border:"1px solid #b2dde8"}}
                        >✓ Kontaktiert</button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            <div className="bg-white border rounded-2xl p-6">
              <div className="flex items-center justify-between mb-4">
                <h3 className="font-bold text-gray-800">📌 Offene Aktionen</h3>
                <span className="text-xs font-semibold px-2.5 py-1 rounded-full" style={{background:"#f0f8fa",color:"#2d7a93"}}>{withActions.length}</span>
              </div>
              {withActions.length===0?(
                <div className="text-center py-8 text-gray-300"><div className="text-4xl mb-2">✓</div><p className="text-sm">Keine offenen Aktionen</p></div>
              ):(
                <>
                  <div className="space-y-2 overflow-y-auto" style={{maxHeight:"260px"}}>
                    {withActions.map(c => (
                      <div key={c.id} className="rounded-xl p-3 -mx-2 border-l-4 transition-colors" style={{borderColor:"#f59e0b",background:"rgba(251,191,36,0.05)"}}>
                        <div className="flex items-start gap-2">
                          {/* Klickbar → Kontakt öffnen */}
                          <div className="flex-1 min-w-0 cursor-pointer" onClick={() => onEdit(c)}>
                            <p className="font-semibold text-sm text-gray-800 truncate">{c.name}</p>
                            <p className="text-xs mt-0.5 leading-relaxed" style={{color:"#92620a"}}>{c.naechsteAktion}</p>
                          </div>
                          {/* Aktions-Buttons */}
                          <div className="flex gap-1 flex-shrink-0 mt-0.5">
                            <button
                              onClick={() => completeAction(c)}
                              title="Erledigt – Aktion abhaken &amp; Historieneintrag erstellen"
                              className="w-7 h-7 rounded-lg flex items-center justify-center font-bold text-sm transition-all hover:scale-110"
                              style={{color:"#2d7a93",background:"#f0f8fa"}}
                            >✓</button>
                            <button
                              onClick={() => skipAction(c)}
                              title="Überspringen – Aktion löschen ohne Eintrag"
                              className="w-7 h-7 rounded-lg flex items-center justify-center text-gray-400 hover:bg-gray-100 transition-all hover:scale-110 text-sm font-bold"
                            >✕</button>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                  <p className="text-xs text-gray-400 mt-3 text-right">
                    <span style={{color:"#2d7a93",fontWeight:600}}>✓</span> = erledigt &amp; protokolliert &nbsp;·&nbsp; <span className="font-bold">✕</span> = überspringen
                  </p>
                </>
              )}
            </div>

            <div className="bg-white border rounded-2xl p-6">
              <h3 className="font-bold text-gray-800 mb-4">📊 Prioritäts- & Netzwerkübersicht</h3>
              <div className="space-y-3 mb-5">
                {["hoch","mittel","niedrig"].map(p => {
                  const cnt=contacts.filter(c=>c.prioritaet===p).length;
                  const pct=total?Math.round((cnt/total)*100):0;
                  return (
                    <div key={p}>
                      <div className="flex justify-between text-sm mb-1"><span className="capitalize font-semibold text-gray-700">{p}</span><span className="text-gray-400">{cnt} · {pct}%</span></div>
                      <div className="w-full bg-gray-100 rounded-full h-2.5"><div className={`h-2.5 rounded-full ${PRIO_BAR[p]}`} style={{width:`${pct}%`}} /></div>
                    </div>
                  );
                })}
              </div>
              {topCities.length>0 && (
                <>
                  <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Top Städte (Wohnort)</p>
                  <div className="space-y-1.5">
                    {topCities.map(([city,cnt]) => (
                      <div key={city} className="flex justify-between text-sm">
                        <span className="text-gray-700">🏠 {city}</span>
                        <span className="font-semibold text-gray-600">{cnt}</span>
                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      );
    };

    // ─── Gamification helpers ─────────────────────────────────────────────────
    const ACT_KEY = "sm_activity_v1";

    const loadActivity = () => {
      try { return JSON.parse(localStorage.getItem(ACT_KEY) || "{}"); } catch { return {}; }
    };
    const saveActivity = (data) => localStorage.setItem(ACT_KEY, JSON.stringify(data));

    const ym = (d) => d.toISOString().slice(0, 7); // "YYYY-MM"
    const ymStr = (s) => (s || "").slice(0, 7);

    const recordSession = () => {
      const act = loadActivity();
      const now = new Date();
      const sessions = act.sessions || [];
      const lastMs = sessions.length ? new Date(sessions[sessions.length - 1]).getTime() : 0;
      if (now.getTime() - lastMs > 2 * 60 * 60 * 1000) { // >2h gap = new session
        act.sessions = [...sessions.slice(-200), now.toISOString()]; // keep last 200
        saveActivity(act);
      }
      return act;
    };

    const computeStats = (contacts) => {
      const now  = new Date();
      const thisM = ym(now);
      const lastM = ym(new Date(now.getFullYear(), now.getMonth() - 1, 1));

      const newThisM  = contacts.filter(c => ymStr(c.erstellt)    === thisM).length;
      const newLastM  = contacts.filter(c => ymStr(c.erstellt)    === lastM).length;
      const updThisM  = contacts.filter(c => ymStr(c.letzterKontakt) === thisM).length;
      const updLastM  = contacts.filter(c => ymStr(c.letzterKontakt) === lastM).length;

      // History entries this / last month
      let histThisM = 0, histLastM = 0;
      contacts.forEach(c => (c.kontakthistorie || []).forEach(h => {
        const m = ymStr(h.datum);
        if (m === thisM) histThisM++;
        else if (m === lastM) histLastM++;
      }));

      // Session-based monthly streak
      const act = loadActivity();
      const sessions = act.sessions || [];
      const monthsWithSession = new Set(sessions.map(s => s.slice(0, 7)));
      let streak = 0;
      for (let i = 0; i <= 24; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        if (monthsWithSession.has(ym(d))) streak++;
        else if (i > 0) break;
      }

      // High-prio all touched this month?
      const highPrio = contacts.filter(c => c.prioritaet === "hoch");
      const allHighTouched = highPrio.length > 0 &&
        highPrio.every(c => ymStr(c.letzterKontakt) === thisM);

      return {
        thisM, lastM, now,
        total: contacts.length,
        newThisM, newLastM,
        updThisM, updLastM,
        histThisM, histLastM,
        streak,
        allHighTouched,
        sessionsThisM: sessions.filter(s => s.startsWith(thisM)).length,
        earnedBadges: act.badges || [],
      };
    };

    const ALL_BADGES = [
      { id:"contacts_10",   icon:"🌱", label:"Erste 10",        desc:"10 Kontakte angelegt",         check: s => s.total >= 10 },
      { id:"contacts_25",   icon:"🌿", label:"Wachstum",         desc:"25 Kontakte angelegt",         check: s => s.total >= 25 },
      { id:"contacts_50",   icon:"🌳", label:"Starkes Netzwerk", desc:"50 Kontakte angelegt",         check: s => s.total >= 50 },
      { id:"contacts_100",  icon:"🏆", label:"100er Klub",       desc:"100 Kontakte angelegt",        check: s => s.total >= 100 },
      { id:"streak_1",      icon:"📅", label:"Erster Monat",     desc:"1 Monat aktiv",                check: s => s.streak >= 1 },
      { id:"streak_3",      icon:"🔥", label:"Quartals-Streak",  desc:"3 Monate aktiv in Folge",      check: s => s.streak >= 3 },
      { id:"streak_6",      icon:"⚡", label:"Halb-Jahr",        desc:"6 Monate aktiv in Folge",      check: s => s.streak >= 6 },
      { id:"high_prio_month",icon:"⭐",label:"Vollständig",      desc:"Alle Hoch-Prio diesen Monat gepflegt", check: s => s.allHighTouched },
      { id:"hist_10",       icon:"📝", label:"Chronist",         desc:"10 Historieneinträge gesamt",  check: (s, contacts) => contacts.reduce((a,c)=>a+(c.kontakthistorie||[]).length,0) >= 10 },
      { id:"update_10_month",icon:"✅",label:"Fleißiger Monat",  desc:"10 Kontakte in einem Monat gepflegt", check: s => s.updThisM >= 10 || s.updLastM >= 10 },
    ];

    const awardNewBadges = (stats, contacts) => {
      const act = loadActivity();
      const earned = new Set(act.badges || []);
      let changed = false;
      ALL_BADGES.forEach(b => {
        if (!earned.has(b.id) && b.check(stats, contacts)) {
          earned.add(b.id); changed = true;
        }
      });
      if (changed) {
        act.badges = [...earned];
        saveActivity(act);
      }
      return [...earned];
    };

    // ─── Activity Pill (header) ───────────────────────────────────────────────
    const ActivityPill = ({ contacts }) => {
      const stats = useMemo(() => computeStats(contacts), [contacts]);
      const total = stats.updThisM + stats.newThisM;
      const prev  = stats.updLastM + stats.newLastM;
      const trend = total > prev ? "up" : total < prev ? "down" : "eq";
      const trendIcon = { up:"↑", down:"↓", eq:"→" }[trend];
      const trendColor = { up:"#22c55e", down:"#94a3b8", eq:"#94a3b8" }[trend];
      const label = `${total} ${total===1?"Kontakt":"Kontakte"} diesen Monat`;

      return (
        <div title={`Letzter Monat: ${prev} · ${label}`}
          className="hidden sm:flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold cursor-default select-none"
          style={{background:"#f0f8fa", border:"1px solid #b2dde8", color:"#25606f"}}>
          <span style={{color: trendColor, fontWeight:700}}>{trendIcon}</span>
          <span>{total}</span>
          <span className="text-gray-400 font-normal hidden md:inline">gepflegt</span>
        </div>
      );
    };

    // ─── Gamification Card (dashboard) ───────────────────────────────────────
    const GamificationCard = ({ contacts }) => {
      const stats = useMemo(() => computeStats(contacts), [contacts]);
      const earned = useMemo(() => awardNewBadges(stats, contacts), [stats]);
      const earnedSet = new Set(earned);

      const totalActivity = stats.updThisM + stats.newThisM;
      const prevActivity  = stats.updLastM + stats.newLastM;
      const delta = totalActivity - prevActivity;
      const trend = delta > 0 ? "up" : delta < 0 ? "down" : "eq";

      // Next unearned badge
      const nextBadge = ALL_BADGES.find(b => !earnedSet.has(b.id));

      // Progress toward next badge
      const badgeProgress = (b) => {
        if (!b) return 0;
        if (b.id === "contacts_10")  return Math.min(1, stats.total / 10);
        if (b.id === "contacts_25")  return Math.min(1, stats.total / 25);
        if (b.id === "contacts_50")  return Math.min(1, stats.total / 50);
        if (b.id === "contacts_100") return Math.min(1, stats.total / 100);
        if (b.id === "streak_1")     return Math.min(1, stats.streak / 1);
        if (b.id === "streak_3")     return Math.min(1, stats.streak / 3);
        if (b.id === "streak_6")     return Math.min(1, stats.streak / 6);
        if (b.id === "update_10_month") return Math.min(1, stats.updThisM / 10);
        if (b.id === "hist_10") {
          const tot = contacts.reduce((a,c)=>a+(c.kontakthistorie||[]).length, 0);
          return Math.min(1, tot / 10);
        }
        return 0;
      };

      const trendLabel = trend==="up"
        ? `↑ ${delta} mehr als letzten Monat`
        : trend==="down"
        ? `↓ ${Math.abs(delta)} weniger als letzten Monat`
        : `→ Vergleichbar mit letztem Monat`;
      const trendColor = trend==="up" ? "#22c55e" : "#94a3b8";

      const monthName = (ym) => {
        const [y,m] = ym.split("-");
        return new Date(+y, +m-1, 1).toLocaleString("de-DE",{month:"long"});
      };

      const prog = badgeProgress(nextBadge);

      return (

              <p className="text-xs text-gray-500 mt-0.5">

            <div className="rounded-xl p-3.5 bg-gray-50 border">

              <p className="text-2xl font-black text-gray-400">{prevActivity}</p>
              <p className="text-xs text-gray-400 mt-0.5">
                {stats.newLastM} neu · {stats.updLastM} gepflegt
              </p>
            </div>
          </div>
          <p className="text-xs font-semibold mb-5" style={{color: trendColor}}>{trendLabel}</p>

          {/* Next badge progress */}
          {nextBadge && (
            <div className="mb-5">
              <div className="flex items-center justify-between mb-1.5">
                <div className="flex items-center gap-2">
                  <span className="text-base">{nextBadge.icon}</span>
                  <span className="text-sm font-semibold text-gray-700">{nextBadge.label}</span>
                </div>
                <span className="text-xs text-gray-400">{Math.round(prog*100)}%</span>
              </div>
              <div className="w-full bg-gray-100 rounded-full h-2">
                <div className="h-2 rounded-full transition-all duration-500"
                  style={{width:`${prog*100}%`, background:"#4fa3b8"}} />
              </div>
              <p className="text-xs text-gray-400 mt-1">{nextBadge.desc}</p>
            </div>
          )}

          {/* Earned badges */}
          {earned.length > 0 && (
            <div>
              <p className="text-xs font-semibold uppercase tracking-wide text-gray-400 mb-2.5">Errungenschaften</p>

                    <span>{b.label}</span>

            </div>

            <p className="text-xs text-gray-400 text-center py-2">
              Noch keine Errungenschaften — leg los! 🚀

    function App() {
      const [contacts, setContacts] = useState(() => {
        try { return JSON.parse(localStorage.getItem("stakeholders_v1")||"[]"); } catch { return []; }
      });
      const [view, setView] = useState("cards");
      const [modalOpen, setModalOpen] = useState(false);
      const [editingContact, setEditingContact] = useState(null);
      const [search, setSearch] = useState("");
      const [filterPrio, setFilterPrio] = useState("alle");
      const [sortBy, setSortBy] = useState("score");
      const [deleteConfirm, setDeleteConfirm] = useState(null);
      const [exportOpen, setExportOpen] = useState(false);
      const [adminOpen, setAdminOpen] = useState(false);
      const [adminSettings, setAdminSettings] = useState(() => {
        try { return JSON.parse(localStorage.getItem("sm_admin_v1")||'{"name":"Julian","wohnort":"","arbeitsort":""}'); } catch { return {name:"Julian",wohnort:"",arbeitsort:""}; }
      });

      const [onboardOpen, setOnboardOpen] = useState(() => !localStorage.getItem("sm_onboarded_v1"));

      useEffect(() => { localStorage.setItem("stakeholders_v1", JSON.stringify(contacts)); }, [contacts]);
      useEffect(() => { localStorage.setItem("sm_admin_v1", JSON.stringify(adminSettings)); }, [adminSettings]);
      useEffect(() => { recordSession(); }, []); // track session on mount

      const finishOnboard = () => {
        localStorage.setItem("sm_onboarded_v1", "1");
        setOnboardOpen(false);
      };
      const addDemoAndFinish = () => {
        setContacts([makeDemoContact()]);
        localStorage.setItem("sm_onboarded_v1", "1");
        setOnboardOpen(false);
      };

      const saveContact = (c) => {
        setContacts(prev => {
          const ex = prev.find(x => x.id===c.id);
          return ex ? prev.map(x => x.id===c.id?c:x) : [...prev, c];
        });
        setModalOpen(false); setEditingContact(null);
      };

      const exportJSON = () => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([JSON.stringify(contacts,null,2)],{type:"application/json"}));
        a.download = `stakeholder-${new Date().toISOString().slice(0,10)}.json`;
        a.click(); setExportOpen(false);
      };

      const exportCSV = () => {
        const fields = ["name","firma","rolle","email","telefon","linkedin","wohnort","arbeitsort","prioritaet","beziehungsstaerke","letzterKontakt","naechsteAktion","score","notizen","tags"];
        const rows = contacts.map(c => fields.map(f => { const v=Array.isArray(c[f])?c[f].join(", "):(c[f]||""); return `"${String(v).replace(/"/g,'""')}"`;}).join(";"));
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob(["\uFEFF"+[fields.join(";"),...rows].join("\n")],{type:"text/csv;charset=utf-8"}));
        a.download = `stakeholder-${new Date().toISOString().slice(0,10)}.csv`;
        a.click(); setExportOpen(false);
      };

      const importJSON = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const imp = JSON.parse(ev.target.result);
            if (Array.isArray(imp)) setContacts(imp.map(c=>({...c,score:calculateScore(c)})));
            else alert("Ungültiges Format.");
          } catch { alert("Lesefehler."); }
        };
        reader.readAsText(file); e.target.value="";
      };

      const filtered = useMemo(() => {
        return contacts
          .filter(c => {
            const q = search.toLowerCase();
            if (q && !["name","firma","rolle","email","notizen","wohnort","arbeitsort"].some(f=>(c[f]||"").toLowerCase().includes(q)) && !(c.tags||[]).some(t=>t.toLowerCase().includes(q))) return false;
            if (filterPrio!=="alle" && c.prioritaet!==filterPrio) return false;
            return true;

                    <button onClick={() => setExportOpen(o=>!o)} className="text-gray-600 border rounded-xl px-2.5 py-2 hover:bg-gray-50 flex items-center gap-1.5 font-medium text-sm">
                      <Ico n="upload" size={15}/><span className="header-actions-text hidden sm:inline">Export ▾</span>
                    </button>
                    {exportOpen && (
                      <div className="absolute right-0 mt-1.5 bg-white border rounded-xl shadow-xl py-1.5 z-10 min-w-[130px]">
                        <button onClick={exportJSON} className="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 font-medium">als JSON</button>

                    <option value="niedrig">🟢 Niedrig</option>
                  </select>
                  <select value={sortBy} onChange={e => setSortBy(e.target.value)}
                    className="border rounded-xl px-3 py-2 text-sm text-gray-700 outline-none focus:ring-2 focus:ring-brand-400">
                    <option value="score">Score ↓</option>
                    <option value="prio">Priorität</option>
                    <option value="name">A–Z</option>
                    <option value="kontakt">Kontakt</option>
                  </select>
                  {(search||filterPrio!=="alle") && <span className="text-xs text-gray-400 self-center">{filtered.length}/{contacts.length}</span>}
                </div>
              )}
            </div>
          </header>

          {/* Mobile FAB: + Kontakt */}
          <button className="fab" onClick={() => { setEditingContact(null); setModalOpen(true); }}>+</button>

          {/* Mobile bottom navigation */}
          <nav className="bottom-nav">
            {VIEWS.map(([v, ico, label]) => (
              <button key={v} onClick={() => setView(v)}
                style={{flex:1, display:"flex", flexDirection:"column", alignItems:"center",
                  justifyContent:"center", gap:"3px", border:"none", background:"none",
                  padding:"4px 2px", cursor:"pointer",
                  color: view===v ? "#2d7a93" : "#94a3b8"}}>
                <Ico n={ico} size={20}/>
                <span style={{fontSize:"10px",fontWeight:view===v?"700":"500",lineHeight:1}}>{label}</span>
              </button>
            ))}
          </nav>

          <main className="max-w-7xl mx-auto px-3 py-4 main-content" onClick={() => exportOpen && setExportOpen(false)}>
            {view==="table" && <TableView contacts={filtered} onEdit={openEdit} onDelete={id => setDeleteConfirm(id)} />}
            {view==="cards" && <CardView contacts={filtered} onEdit={openEdit} onDelete={id => setDeleteConfirm(id)} />}
            {view==="map" && <MapView contacts={contacts} onEdit={openEdit} />}
            {view==="network" && <NetworkView contacts={contacts} onEdit={openEdit} adminSettings={adminSettings} />}
            {view==="dashboard" && <DashboardView contacts={contacts} onEdit={openEdit}
              onUpdate={c => setContacts(prev => prev.map(x => x.id===c.id ? c : x))} />}
          </main>

          {modalOpen && (
            <ContactModal
              key={editingContact?.id || "new"}
              contact={editingContact}
              onSave={saveContact}
              onClose={() => { setModalOpen(false); setEditingContact(null); }}
              onOpenContact={(c) => { setEditingContact(c); }}
              allContacts={contacts} />
          )}

          {adminOpen && (
            <AdminModal settings={adminSettings} onSave={s => setAdminSettings(s)} onClose={() => setAdminOpen(false)} />
          )}

          {deleteConfirm && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50" style={{backdropFilter:"blur(4px)"}}>
              <div className="bg-white rounded-2xl p-6 shadow-2xl max-w-sm w-full mx-4">
                <h3 className="font-bold text-gray-900 mb-2 text-lg">Kontakt löschen?</h3>
                <p className="text-sm text-gray-500 mb-5">Diese Aktion kann nicht rückgängig gemacht werden.</p>
                <div className="flex gap-3 justify-end">
                  <button onClick={() => setDeleteConfirm(null)} className="px-5 py-2.5 border rounded-xl text-sm font-medium hover:bg-gray-50">Abbrechen</button>
                  <button onClick={() => { setContacts(p=>p.filter(c=>c.id!==deleteConfirm)); setDeleteConfirm(null); }}
                    className="px-5 py-2.5 bg-red-500 text-white rounded-xl text-sm font-bold hover:bg-red-600">Löschen</button>
                </div>
              </div>
            </div>
          )}

          {onboardOpen && (
            <OnboardingModal onFinish={finishOnboard} onAddDemo={addDemoAndFinish} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

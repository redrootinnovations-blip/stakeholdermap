<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ─── Geocoding Cache (persists across React re-renders) ─────────────────
    if (!window._geoCache) window._geoCache = {};
    let _geoDelay = 0;

    const geocodeCity = async (city) => {
      if (!city || !city.trim()) return null;
      const key = city.trim().toLowerCase();
      if (window._geoCache[key] !== undefined) return window._geoCache[key];
      _geoDelay += 650;
      await new Promise(r => setTimeout(r, _geoDelay));
      _geoDelay = Math.max(0, _geoDelay - 650);
      try {
        const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city + ", Deutschland")}&format=json&limit=1&accept-language=de`;
        const resp = await fetch(url);
        if (!resp.ok) { window._geoCache[key] = null; return null; }
        const data = await resp.json();
        if (data.length > 0) {
          const c = { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
          window._geoCache[key] = c;
          return c;
        }
      } catch {}
      window._geoCache[key] = null;
      return null;
    };

    // ─── Utilities ──────────────────────────────────────────────────────────
    const generateId = () => Math.random().toString(36).substr(2,9) + Date.now().toString(36);

    const calculateScore = (c) => {
      let s = 0;
      s += (c.beziehungsstaerke || 1) * 4;
      if (c.prioritaet === "hoch") s += 20;
      else if (c.prioritaet === "mittel") s += 10;
      else if (c.prioritaet === "niedrig") s += 5;
      if (c.letzterKontakt) {
        const d = Math.floor((new Date() - new Date(c.letzterKontakt)) / 86400000);
        if (d < 30) s += 20; else if (d < 90) s += 10; else if (d < 180) s += 5;
      }
      ["email","telefon","linkedin","firma","rolle"].forEach(f => { if (c[f]) s += 4; });
      if (c.naechsteAktion) s += 10;
      if (c.tags && c.tags.length > 0) s += 5;
      if (c.notizen) s += 5;
      return Math.min(s, 100);
    };

    const parseIntelligentText = (text) => {
      const u = {};
      const emailM = text.match(/[\w.+-]+@[\w.-]+\.\w+/);
      if (emailM) u.email = emailM[0];
      const phoneM = text.match(/(\+?\d[\d\s\-().]{6,}\d)/);
      if (phoneM) u.telefon = phoneM[0].trim();
      const liM = text.match(/linkedin\.com\/in\/([\w-]+)/i);
      if (liM) u.linkedin = "https://linkedin.com/in/" + liM[1];
      const coM = text.match(/(?:bei|von|@|at)\s+([A-ZÄÖÜ][^\s,.\n]{1,30}(?:\s[A-ZÄÖÜ][^\s,.\n]{1,20})?)/);
      if (coM) u.firma = coM[1].trim();
      const wohnM = text.match(/(?:wohnt in|lebt in|wohnhaft in|wohnort:)\s+([A-ZÄÖÜa-zäöü][^\s,.\n]{2,25})/i);
      if (wohnM) u.wohnort = wohnM[1].trim();
      const arbM = text.match(/(?:arbeitet in|büro in|office in|sitzt in|arbeitsort:)\s+([A-ZÄÖÜa-zäöü][^\s,.\n]{2,25})/i);
      if (arbM) u.arbeitsort = arbM[1].trim();
      const roles = ["CEO","CTO","COO","CFO","CMO","CPO","Founder","Co-Founder","Gründer","Director","Manager","VP","Head of","Lead","Partner","Investor","Angel","Berater","Consultant","Freelancer","Developer","Designer","Engineer","Geschäftsführer","Vorstand"];
      for (const r of roles) { if (text.toLowerCase().includes(r.toLowerCase())) { u.rolle = r; break; } }
      const lt = text.toLowerCase();
      if (["sehr gut","enge","alter freund","langjährig","vertrauen","mentor","bester"].some(w => lt.includes(w))) u.beziehungsstaerke = 5;
      else if (["gut befreundet","kenne ihn gut","kenne sie gut"].some(w => lt.includes(w))) u.beziehungsstaerke = 4;
      else if (["kenne","bekannt","kollege","netzwerk","verbunden"].some(w => lt.includes(w))) u.beziehungsstaerke = 3;
      else if (["flüchtig","oberflächlich","neu","kaum"].some(w => lt.includes(w))) u.beziehungsstaerke = 1;
      if (["sehr wichtig","key contact","kritisch","prio 1","unbedingt","investor","schlüsselkontakt"].some(w => lt.includes(w))) u.prioritaet = "hoch";
      else if (["wichtig","relevant","interessant"].some(w => lt.includes(w))) u.prioritaet = "mittel";
      else if (["optional","später","unwichtig"].some(w => lt.includes(w))) u.prioritaet = "niedrig";
      const dM = text.match(/(\d{1,2})[.\-\/](\d{1,2})[.\-\/](\d{2,4})/);
      if (dM) {
        const d = dM[1].padStart(2,"0"), m = dM[2].padStart(2,"0");
        const y = dM[3].length === 2 ? "20"+dM[3] : dM[3];
        u.letzterKontakt = `${y}-${m}-${d}`;
      }
      const aM = text.match(/(anrufen|schreiben|treffen|kontaktieren|follow.?up|nachfassen|einladen|anfragen)[^.!?\n]{0,60}/i);
      if (aM) u.naechsteAktion = aM[0].trim();
      const tagM = text.match(/#([\w\-äöüÄÖÜ]+)/g);
      if (tagM) u.tags = tagM.map(t => t.slice(1));
      return u;
    };

    const EMPTY_CONTACT = {
      name:"", firma:"", rolle:"", email:"", telefon:"", linkedin:"",
      wohnort:"", arbeitsort:"",
      beziehungsstaerke:3, prioritaet:"mittel", letzterKontakt:"",
      naechsteAktion:"", tags:[], notizen:"", kontakthistorie:[],
      verbindungen:[], freifeld:"", score:0,
    };

    const PRIO_STYLE = {
      hoch:"bg-red-100 text-red-700 border-red-200",
      mittel:"bg-amber-100 text-amber-700 border-amber-200",
      niedrig:"bg-green-100 text-green-700 border-green-200"
    };
    const PRIO_BAR = { hoch:"bg-red-400", mittel:"bg-amber-400", niedrig:"bg-green-400" };
    const PRIO_DOT = { hoch:"bg-red-500", mittel:"bg-amber-500", niedrig:"bg-green-500" };
    const PRIO_HEX = { hoch:"#f87171", mittel:"#fbbf24", niedrig:"#4ade80" };

    // ─── Inline SVG Icon Component (Lucide-style) ───────────────────────────
    const ICO = {
      handshake: <><path d="m11 17 2 2a1 1 0 1 0 3-3"/><path d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 1-3-3l2.81-2.81a5.79 5.79 0 0 1 7.06-.87l.47.28a2 2 0 0 0 1.42.25L21 4"/><path d="m21 3 1 11h-1"/><path d="M3 3 2 14l6.5 6.5a1 1 0 1 0 3-3"/><path d="M3 4h8"/></>,
      table:     <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/>,
      grid:      <><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></>,
      map:       <><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></>,
      network:   <><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></>,
      dashboard: <><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></>,
      download:  <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></>,
      upload:    <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></>,
      settings:  <><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>,
      contact:   <><path d="M17 18a2 2 0 0 0-2-2H9a2 2 0 0 0-2 2"/><rect width="18" height="18" x="3" y="4" rx="2"/><circle cx="12" cy="10" r="2"/><line x1="8" x2="8" y1="2" y2="4"/><line x1="16" x2="16" y1="2" y2="4"/></>,
      search:    <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>,
      rocket:    <><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></>,
      users:     <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
      target:    <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
    };
    const Ico = ({ n, size=16, style={}, className="" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
        stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
        className={className} style={{display:"inline-block",verticalAlign:"middle",flexShrink:0,...style}}>
        {ICO[n] || null}
      </svg>
    );

    // ─── Reusable Components ────────────────────────────────────────────────
    const ScoreBadge = ({ score }) => {
      const color = score >= 70 ? "bg-brand-600" : score >= 40 ? "bg-brand-400" : "bg-brand-200";
      return (
        <div className="flex items-center gap-2">
          <div className="w-20 bg-gray-200 rounded-full h-2 flex-shrink-0">
            <div className={`${color} h-2 rounded-full`} style={{width:`${score}%`}} />
          </div>
          <span className="text-xs font-semibold text-gray-600 w-8">{score}</span>
        </div>
      );
    };

    const Stars = ({ value, onChange, readonly=false }) => (
      <div className="flex gap-0.5">
        {[1,2,3,4,5].map(s => (
          <button key={s} type="button" onClick={() => !readonly && onChange?.(s)}
            className={`text-xl leading-none ${s<=value?"text-amber-400":"text-gray-200"} ${!readonly?"hover:text-amber-300 cursor-pointer":"cursor-default"}`}>★</button>
        ))}
      </div>
    );

    const TagInput = ({ tags, onChange }) => {
      const [input, setInput] = useState("");
      const add = (e) => {
        if ((e.key==="Enter"||e.key===",") && input.trim()) {
          e.preventDefault();
          if (!tags.includes(input.trim())) onChange([...tags, input.trim()]);
          setInput("");
        }
      };
      return (
        <div className="flex flex-wrap gap-1.5 border rounded-xl p-2 min-h-[42px] focus-within:ring-2 focus-within:ring-blue-400 bg-white">
          {tags.map(t => (
            <span key={t} className="bg-brand-100 text-brand-700 text-xs px-2.5 py-1 rounded-full flex items-center gap-1 font-medium">
              {t}<button type="button" onClick={() => onChange(tags.filter(x => x!==t))} className="hover:text-blue-900 font-bold ml-0.5">×</button>
            </span>
          ))}
          <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={add}
            placeholder={tags.length===0?"Tag hinzufügen und Enter drücken…":""}
            className="outline-none text-sm flex-1 min-w-[120px] bg-transparent" />
        </div>
      );
    };

    // ─── Verbindungs-Manager ────────────────────────────────────────────────
    const VerbindungsManager = ({ verbindungen, onChange, allContacts, currentId }) => {
      const [selId, setSelId] = useState("");
      const [selTyp, setSelTyp] = useState("kennt");
      const [notiz, setNotiz] = useState("");
      const available = allContacts.filter(c => c.id !== currentId && !verbindungen.find(v => v.kontaktId===c.id));
      const add = () => {
        if (!selId) return;
        onChange([...verbindungen, {kontaktId:selId, typ:selTyp, notiz}]);
        setSelId(""); setNotiz("");
      };
      return (
        <div className="space-y-4">
          <div className="bg-gray-50 rounded-xl p-4 space-y-3">
            <p className="text-sm font-semibold text-gray-700">Verbindung hinzufügen</p>
            <select value={selId} onChange={e => setSelId(e.target.value)}
              className="w-full border rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-400 bg-white">
              <option value="">Kontakt auswählen…</option>
              {available.map(c => <option key={c.id} value={c.id}>{c.name}{c.firma?` (${c.firma})`:""}</option>)}
            </select>
            <div className="flex gap-2">
              <select value={selTyp} onChange={e => setSelTyp(e.target.value)}
                className="border rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-400 bg-white">
                {["kennt","arbeitet mit","empfohlen von","Kollege","Investor","Mentor","Freund","Partner","Kunde","Konkurrent"].map(t => <option key={t}>{t}</option>)}
              </select>
              <input value={notiz} onChange={e => setNotiz(e.target.value)} placeholder="Notiz (optional)"
                className="flex-1 border rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-400" />
              <button onClick={add} disabled={!selId}
                className="bg-brand-600 text-white px-4 py-2.5 rounded-xl hover:bg-brand-700 disabled:opacity-40 font-bold text-sm">+</button>
            </div>
          </div>
          {verbindungen.length===0 ? (
            <div className="text-center py-10 text-gray-300">
              <div className="text-4xl mb-2">🔗</div><p className="text-sm">Noch keine Verbindungen</p>
            </div>
          ) : (
            <div className="space-y-2">
              {verbindungen.map((v,i) => {
                const k = allContacts.find(c => c.id===v.kontaktId);
                if (!k) return null;
                return (
                  <div key={i} className="bg-white border rounded-xl p-3.5 flex items-center justify-between">
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className="font-semibold text-sm text-gray-800">{k.name}</span>
                      <span className="bg-indigo-100 text-indigo-700 text-xs px-2 py-0.5 rounded-full font-medium">{v.typ}</span>
                      {v.notiz && <span className="text-gray-400 text-xs">({v.notiz})</span>}
                    </div>
                    <button onClick={() => onChange(verbindungen.filter((_,j) => j!==i))}
                      className="text-gray-300 hover:text-red-500 text-xl ml-2">×</button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    // ─── Duplicate Detection helpers ─────────────────────────────────────────
    const TITLES = /\b(dr\.?|prof\.?|dipl\.?|ing\.?|mag\.?|m\.sc\.?|b\.sc\.?|mba\.?|h\.c\.?|ph\.d\.?|jr\.?|sr\.?)\s*/gi;

    const normalizeName = (name) =>
      name.toLowerCase()
        .replace(TITLES, "")
        .replace(/['\-_.,!?]/g, "")
        .replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue").replace(/ß/g,"ss")
        .replace(/\s+/g," ").trim();

    const levenshtein = (a, b) => {
      const m = a.length, n = b.length;
      if (!m) return n; if (!n) return m;
      const row = Array.from({length: n+1}, (_,i) => i);
      for (let i = 1; i <= m; i++) {
        let prev = i;
        for (let j = 1; j <= n; j++) {
          const val = a[i-1]===b[j-1] ? row[j-1] : 1+Math.min(row[j-1], row[j], prev);
          row[j-1] = prev; prev = val;
        }
        row[n] = prev;
      }
      return row[n];
    };

    const findDuplicates = (name, contacts, currentId) => {
      if (!name || name.trim().length < 2) return [];
      const norm = normalizeName(name);
      if (norm.length < 2) return [];
      return contacts
        .filter(c => c.id !== currentId && c.name)
        .map(c => {
          const cn = normalizeName(c.name);
          const dist = levenshtein(norm, cn);
          const maxLen = Math.max(norm.length, cn.length);
          const sim = maxLen > 0 ? 1 - dist / maxLen : 0;
          return { contact: c, sim, dist };
        })
        .filter(r => r.sim >= 0.72 || r.dist <= 2)
        .sort((a, b) => b.sim - a.sim)
        .slice(0, 3);
    };

    // ─── Contact Modal ──────────────────────────────────────────────────────
    const ContactModal = ({ contact, onSave, onClose, onOpenContact, allContacts }) => {
      const [form, setForm] = useState(contact ? {...contact} : {...EMPTY_CONTACT, id:generateId(), erstellt:new Date().toISOString()});
      const [tab, setTab] = useState("basis");
      const [histInput, setHistInput] = useState("");
      const [smartText, setSmartText] = useState("");
      const [smartResult, setSmartResult] = useState(null);
      const [dupeHits, setDupeHits] = useState([]);
      const [ignoreDupes, setIgnoreDupes] = useState(false);
      const isNew = !contact;

      // Duplicate check — runs 350ms after name stops changing, only for new contacts
      useEffect(() => {
        if (!isNew || ignoreDupes || !form.name || form.name.trim().length < 3) {
          setDupeHits([]); return;
        }
        const t = setTimeout(() => setDupeHits(findDuplicates(form.name, allContacts, form.id)), 350);
        return () => clearTimeout(t);
      }, [form.name, isNew, ignoreDupes]);

      const set = (f, v) => setForm(p => ({...p, [f]:v}));

      const applySmartText = () => {
        if (!smartText.trim()) return;
        const text = smartText.trim();
        const lt = text.toLowerCase();
        const changes = [];
        const updates = {};
        // Always create a history entry
        updates.kontakthistorie = [{ datum: new Date().toISOString(), text, quelle: "smart" }, ...(form.kontakthistorie || [])];
        changes.push("📋 Historieneintrag erstellt");
        // Detect contact date
        const dM = text.match(/(\d{1,2})[.\-\/](\d{1,2})[.\-\/](\d{2,4})/);
        if (dM) {
          const d2 = dM[1].padStart(2,"0"), m2 = dM[2].padStart(2,"0");
          const y2 = dM[3].length===2?"20"+dM[3]:dM[3];
          updates.letzterKontakt = `${y2}-${m2}-${d2}`;
          changes.push("📅 Letzter Kontakt: " + new Date(updates.letzterKontakt).toLocaleDateString("de-DE",{day:"2-digit",month:"short",year:"numeric"}));
        } else if (["getroffen","gesprochen","angerufen","meeting","call","lunch","kaffee","treffen","telefoniert","kontakt gehabt"].some(w => lt.includes(w))) {
          updates.letzterKontakt = new Date().toISOString().slice(0,10);
          changes.push("📅 Letzter Kontakt: heute");
        }
        // Detect relationship shift
        let newBez = null;
        if (["sehr gut","enge","alter freund","langjährig","vertrauen","mentor","bester","vertraut","sehr eng","enger vertrauter"].some(w => lt.includes(w))) newBez = 5;
        else if (["gut befreundet","kenne ihn gut","kenne sie gut","eng befreundet"].some(w => lt.includes(w))) newBez = 4;
        else if (["gut bekannt","kenne","bekannt","netzwerk","verbunden","kolleg"].some(w => lt.includes(w))) newBez = Math.max(form.beziehungsstaerke||1, 3);
        else if (["flüchtig","oberflächlich","kaum","neu kennengelernt","erstkontakt"].some(w => lt.includes(w))) newBez = 1;
        if (newBez !== null && newBez !== (form.beziehungsstaerke||3)) {
          updates.beziehungsstaerke = newBez;
          changes.push("⭐ Beziehungsstärke: " + "★".repeat(newBez) + "☆".repeat(5-newBez));
        }
        // Detect next action
        const aM = text.match(/(anrufen|schreiben|treffen|kontaktieren|follow.?up|nachfassen|einladen|anfragen|mailen|pitchen|vorstellen|einbuchen)[^.!?\n]{0,60}/i);
        if (aM && aM[0].trim() !== form.naechsteAktion) {
          updates.naechsteAktion = aM[0].trim();
          changes.push("✅ Nächste Aktion: " + updates.naechsteAktion.slice(0,45) + (updates.naechsteAktion.length>45?"…":""));
        }
        // Detect priority shift
        let newPrio = null;
        if (["sehr wichtig","key contact","kritisch","prio 1","unbedingt","schlüsselkontakt","top prio","höchste priorität"].some(w => lt.includes(w))) newPrio = "hoch";
        else if (["wichtig","relevant","interessant"].some(w => lt.includes(w)) && form.prioritaet !== "hoch") newPrio = "mittel";
        if (newPrio && newPrio !== form.prioritaet) { updates.prioritaet = newPrio; changes.push("🎯 Priorität: " + newPrio); }
        // Apply updates silently + recalculate score
        setForm(f => { const u = {...f, ...updates}; u.score = calculateScore(u); return u; });
        setSmartText("");
        setSmartResult({ changes });
      };

      const addHistory = () => {
        if (!histInput.trim()) return;
        set("kontakthistorie", [{datum:new Date().toISOString(), text:histInput.trim()}, ...(form.kontakthistorie||[])]);
        setHistInput("");
      };

      const handleSave = () => {
        const u = {...form, aktualisiert:new Date().toISOString()};
        u.score = calculateScore(u);
        onSave(u);
      };

      const TABS = [["basis","Basis"],["details","Details"],["ort","📍 Ort"],["verbindungen","🔗 Verbindungen"],["notizen","Notizen"],["historie","Verlauf"],["freifeld","✨ Smart"]];
      const liveScore = calculateScore(form);
      const othersForVerbindungen = allContacts.filter(c => c.id !== form.id);

      return (
        <div className="fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-50 sm:p-4" style={{backdropFilter:"blur(4px)"}}>
          <div className="bg-white sm:rounded-2xl rounded-t-2xl shadow-2xl w-full sm:max-w-2xl flex flex-col" style={{maxHeight:"94vh"}}>
            <div className="flex items-center justify-between px-4 sm:px-6 py-4 sm:py-5 border-b">
              <div>
                <h2 className="text-lg font-bold text-gray-900">{contact?"Kontakt bearbeiten":"Neuer Kontakt"}</h2>
                {form.name && <p className="text-sm text-gray-400">{form.name}{form.firma?` · ${form.firma}`:""}</p>}
              </div>
              <div className="flex items-center gap-4">
                <div className="text-right">
                  <div className="text-xs text-gray-400">Score</div>
                  <div className="text-xl font-bold text-brand-600">{liveScore}</div>
                </div>
                <button onClick={onClose} className="text-gray-300 hover:text-gray-600 text-3xl leading-none">×</button>
              </div>
            </div>

            <div className="flex border-b px-4 gap-0 overflow-x-auto">
              {TABS.map(([t,l]) => (
                <button key={t} onClick={() => setTab(t)}
                  className={`px-3 py-3 text-xs font-semibold border-b-2 whitespace-nowrap transition-colors ${tab===t?"border-brand-500 text-brand-600":"border-transparent text-gray-400 hover:text-gray-700"}`}>{l}</button>
              ))}
            </div>

            <div className="flex-1 overflow-y-auto p-6 space-y-4">
              {tab==="basis" && (
                <>
                  <div className="grid gap-4 mobile-grid-1" style={{gridTemplateColumns:"repeat(2,1fr)"}}>
                    <div className="col-span-2">
                      <label className="block text-sm font-semibold text-gray-700 mb-1">Name <span className="text-red-400">*</span></label>
                      <input value={form.name} onChange={e => { set("name",e.target.value); setIgnoreDupes(false); }}
                        placeholder="Vor- und Nachname"
                        className={`w-full border rounded-xl px-3 py-2.5 focus:ring-2 focus:ring-brand-400 outline-none transition-colors ${dupeHits.length>0&&!ignoreDupes?"border-amber-400 focus:ring-amber-400":""}`} />
                    </div>

                    {/* ── Duplicate warning ───────────────────────────────── */}
                    {dupeHits.length > 0 && !ignoreDupes && (
                      <div className="col-span-2 rounded-xl border overflow-hidden"
                        style={{borderColor:"#fcd34d",background:"#fffbeb"}}>
                        <div className="px-4 pt-3 pb-2 flex items-start gap-2.5">
                          <span className="text-lg flex-shrink-0">⚠️</span>
                          <div>
                            <p className="text-sm font-bold text-amber-800">
                              {dupeHits.length === 1 ? "Mögliches Duplikat gefunden" : `${dupeHits.length} ähnliche Kontakte gefunden`}
                            </p>
                            <p className="text-xs text-amber-600 mt-0.5">
                              Ist das derselbe Kontakt, der bereits angelegt wurde?
                            </p>
                          </div>
                        </div>

                        <div className="px-4 pb-3 space-y-2">
                          {dupeHits.map(d => (
                            <div key={d.contact.id}
                              className="bg-white border rounded-xl px-3 py-2.5 flex items-center gap-3"
                              style={{borderColor:"#fde68a"}}>
                              <div className="flex-1 min-w-0">
                                <p className="text-sm font-semibold text-gray-800 truncate">{d.contact.name}</p>
                                <p className="text-xs text-gray-400 truncate">
                                  {[d.contact.rolle, d.contact.firma, d.contact.wohnort].filter(Boolean).join(" · ")}
                                </p>
                              </div>
                              <span className="text-xs font-bold px-2 py-0.5 rounded-full flex-shrink-0"
                                style={{background:"#fef3c7",color:"#92400e"}}>
                                {Math.round(d.sim*100)}% Ähnlichkeit
                              </span>
                              {onOpenContact && (
                                <button
                                  onClick={() => { onOpenContact(d.contact); onClose(); }}
                                  className="flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-lg whitespace-nowrap"
                                  style={{background:"#d9eef4",color:"#1e4d5c"}}>
                                  Diesen öffnen
                                </button>
                              )}
                            </div>
                          ))}
                        </div>

                        <div className="px-4 pb-3 flex items-center justify-between">
                          <p className="text-xs text-amber-600">Kein Duplikat?</p>
                          <button
                            onClick={() => setIgnoreDupes(true)}
                            className="text-xs font-semibold text-amber-700 hover:underline">
                            Trotzdem neu anlegen →
                          </button>
                        </div>
                      </div>
                    )}
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-1">Firma</label>
                      <input value={form.firma} onChange={e => set("firma",e.target.value)}
                        className="w-full border rounded-xl px-3 py-2.5 focus:ring-2 focus:ring-brand-400 outline-none" />
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-1">Rolle / Position</label>
                      <input value={form.rolle} onChange={e => set("rolle",e.target.value)} placeholder="z. B. CEO, Investor…"
                        className="w-full border rounded-xl px-3 py-2.5 focus:ring-2 focus:ring-brand-400 outline-none" />
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-1">E-Mail</label>
                      <input type="email" value={form.email} onChange={e => set("email",e.target.value)}
                        className="w-full border rounded-xl px-3 py-2.5 focus:ring-2 focus:ring-brand-400 outline-none" />
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-1">Telefon</label>
                      <input value={form.telefon} onChange={e => set("telefon",e.target.value)}
                        className="w-full border rounded-xl px-3 py-2.5 focus:ring-2 focus:ring-brand-400 outline-none" />
                    </div>
                    <div className="col-span-2">
                      <label className="block text-sm font-semibold text-gray-700 mb-1">LinkedIn</label>
                      <input value={form.linkedin} onChange={e => set("linkedin",e.target.value)} placeholder="https://linkedin.com/in/…"
                        className="w-full border rounded-xl px-3 py-2.5 focus:ring-2 focus:ring-brand-400 outline-none" />
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-1">Tags</label>
                    <TagInput tags={form.tags||[]} onChange={v => set("tags",v)} />
                  </div>
                </>
              )}

              {tab==="ort" && (
                <div className="space-y-4">
                  <div className="bg-brand-50 border border-brand-100 rounded-xl p-4 text-sm text-blue-700">
                    Diese Angaben werden in der <strong>Kartenansicht</strong> angezeigt und ermöglichen dir, dein Netzwerk geografisch zu visualisieren.
                  </div>
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-1">🏠 Wohnort</label>
                    <input value={form.wohnort} onChange={e => set("wohnort",e.target.value)} placeholder="z. B. München, Berlin, Hamburg…"
                      className="w-full border rounded-xl px-3 py-2.5 focus:ring-2 focus:ring-brand-400 outline-none" />
                  </div>
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-1">🏢 Arbeitsort</label>
                    <input value={form.arbeitsort} onChange={e => set("arbeitsort",e.target.value)} placeholder="z. B. Frankfurt, München…"
                      className="w-full border rounded-xl px-3 py-2.5 focus:ring-2 focus:ring-brand-400 outline-none" />
                  </div>
                  {(form.wohnort||form.arbeitsort) && (
                    <div className="bg-gray-50 rounded-xl p-4 text-sm text-gray-600">
                      <p className="font-semibold mb-1">Vorschau</p>
                      {form.wohnort && <p>🏠 Wohnort: <strong>{form.wohnort}</strong></p>}
                      {form.arbeitsort && <p>🏢 Arbeitsort: <strong>{form.arbeitsort}</strong></p>}
                    </div>
                  )}
                </div>
              )}

              {tab==="verbindungen" && (
                <VerbindungsManager
                  verbindungen={form.verbindungen||[]}
                  onChange={v => set("verbindungen",v)}
                  allContacts={othersForVerbindungen}
                  currentId={form.id}
                />
              )}

              {tab==="details" && (
                <div className="space-y-5">
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">Beziehungsstärke</label>
                    <Stars value={form.beziehungsstaerke} onChange={v => set("beziehungsstaerke",v)} />
                    <p className="text-xs text-gray-400 mt-1">{["","Oberflächlich","Bekannt","Netzwerk","Gut bekannt","Enge Verbindung"][form.beziehungsstaerke]}</p>
                  </div>
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">Priorität</label>
                    <div className="flex gap-2">
                      {["hoch","mittel","niedrig"].map(p => (
                        <button key={p} type="button" onClick={() => set("prioritaet",p)}
                          className={`px-5 py-2 rounded-xl text-sm font-semibold border-2 transition-all capitalize ${form.prioritaet===p?PRIO_STYLE[p]+" border-current":"bg-white text-gray-400 border-gray-200 hover:border-gray-300"}`}>{p}</button>
                      ))}
                    </div>
                  </div>
                  <div className="grid gap-4 mobile-grid-1" style={{gridTemplateColumns:"repeat(2,1fr)"}}>
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-1">Letzter Kontakt</label>
                      <input type="date" value={form.letzterKontakt} onChange={e => set("letzterKontakt",e.target.value)}
                        className="w-full border rounded-xl px-3 py-2.5 focus:ring-2 focus:ring-brand-400 outline-none" />
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-1">Nächste Aktion</label>
                      <input value={form.naechsteAktion} onChange={e => set("naechsteAktion",e.target.value)} placeholder="Was als Nächstes?"
                        className="w-full border rounded-xl px-3 py-2.5 focus:ring-2 focus:ring-brand-400 outline-none" />
                    </div>
                  </div>
                  <div className="rounded-2xl p-4" style={{background:"linear-gradient(135deg,#f0f8fa,#d9eef4)"}}>
                    <div className="flex justify-between items-center mb-3">
                      <span className="text-sm font-semibold text-gray-700">Score-Vorschau</span>
                      <span className="text-3xl font-black text-brand-600">{liveScore}<span className="text-base font-medium text-gray-400">/100</span></span>
                    </div>
                    <ScoreBadge score={liveScore} />
                  </div>
                </div>
              )}

              {tab==="notizen" && (
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-1">Freie Notizen</label>
                  <textarea value={form.notizen} onChange={e => set("notizen",e.target.value)} rows={12}
                    placeholder="Persönliche Notizen, Gesprächsthemen, Besonderheiten…"
                    className="w-full border rounded-xl px-3 py-2.5 focus:ring-2 focus:ring-brand-400 outline-none resize-none" />
                </div>
              )}

              {tab==="historie" && (
                <div className="space-y-3">
                  <div className="flex gap-2">
                    <input value={histInput} onChange={e => setHistInput(e.target.value)}
                      onKeyDown={e => e.key==="Enter" && addHistory()}
                      placeholder="Neuen Kontakteintrag hinzufügen…"
                      className="flex-1 border rounded-xl px-3 py-2.5 focus:ring-2 focus:ring-brand-400 outline-none" />
                    <button onClick={addHistory} className="bg-brand-600 text-white px-4 py-2 rounded-xl hover:bg-brand-700 font-bold text-lg">+</button>
                  </div>
                  {(form.kontakthistorie||[]).length===0 && (
                    <div className="text-center py-12 text-gray-300"><div className="text-4xl mb-2">📅</div><p className="text-sm">Noch keine Einträge</p></div>
                  )}
                  <div className="space-y-2">
                    {(form.kontakthistorie||[]).map((e,i) => (
                      <div key={i} className="bg-gray-50 rounded-xl p-3.5 flex justify-between items-start group">
                        <div>
                          <p className="text-sm text-gray-800">{e.text}</p>
                          <p className="text-xs text-gray-400 mt-1">{new Date(e.datum).toLocaleDateString("de-DE",{day:"2-digit",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"})}</p>
                        </div>
                        <button onClick={() => set("kontakthistorie",form.kontakthistorie.filter((_,j) => j!==i))}
                          className="text-gray-300 hover:text-red-500 ml-2 text-lg">×</button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {tab==="freifeld" && (
                <div className="space-y-4">
                  <div className="rounded-2xl p-4 text-sm text-gray-700 border border-violet-100" style={{background:"linear-gradient(to right,#f5f3ff,#eff6ff)"}}>
                    <p className="font-semibold text-violet-700 mb-1">✨ Smart-Eintrag</p>
                    <p>Schreib frei über ein Gespräch, Treffen oder eine Begegnung. Der Text wird als Historieneintrag gespeichert und das Scoring im Hintergrund aktualisiert – keine manuellen Felder nötig.</p>
                  </div>
                  <textarea value={smartText} onChange={e => { setSmartText(e.target.value); if(smartResult) setSmartResult(null); }} rows={7}
                    placeholder={"Beispiele:\n• \"Heute getroffen. Sehr gutes Gespräch – wichtiger Kontakt. Follow up nächste Woche.\"\n• \"Meeting am 15.03. – ist nun enger Vertrauter. Nächste Aktion: einladen zur Demo.\"\n• \"Erstkontakt auf Netzwerkevent. Interessant für später.\""}
                    className="w-full border rounded-xl px-3 py-2.5 focus:ring-2 focus:ring-violet-400 outline-none resize-none text-sm" />
                  {smartResult && (
                    <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-4">
                      <p className="text-sm font-semibold text-emerald-800 mb-2">✅ Verarbeitet</p>
                      <div className="space-y-1">
                        {smartResult.changes.map((c,i) => (
                          <p key={i} className="text-sm text-emerald-700">{c}</p>
                        ))}
                      </div>
                    </div>
                  )}
                  <button onClick={applySmartText} disabled={!smartText.trim()}
                    className="w-full bg-violet-600 text-white py-2.5 rounded-xl hover:bg-violet-700 disabled:opacity-40 text-sm font-semibold transition-colors">
                    ✨ Analysieren &amp; Eintragen
                  </button>
                  {(form.kontakthistorie||[]).some(e => e.quelle==="smart") && (
                    <div className="border-t pt-3">
                      <p className="text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Vorherige Smart-Einträge</p>
                      {(form.kontakthistorie||[]).filter(e => e.quelle==="smart").slice(0,3).map((e,i) => (
                        <div key={i} className="rounded-xl p-3 mb-2 text-xs border border-violet-100" style={{background:"#faf8ff"}}>
                          <p className="text-gray-600 leading-relaxed">{e.text.length>120?e.text.slice(0,120)+"…":e.text}</p>
                          <p className="text-violet-400 mt-1">{new Date(e.datum).toLocaleDateString("de-DE",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})}</p>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>

            <div className="flex justify-between items-center gap-3 px-6 py-4 border-t bg-gray-50 rounded-b-2xl">
              <ScoreBadge score={liveScore} />
              <div className="flex gap-3">
                <button onClick={onClose} className="px-5 py-2.5 text-gray-600 border rounded-xl hover:bg-white text-sm font-medium">Abbrechen</button>
                <button onClick={handleSave} disabled={!form.name.trim()}
                  className="px-6 py-2.5 bg-brand-600 text-white rounded-xl hover:bg-brand-700 disabled:opacity-40 font-semibold text-sm">Speichern</button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ─── Table View ─────────────────────────────────────────────────────────
    const TableView = ({ contacts, onEdit, onDelete }) => {
      if (contacts.length===0) return (
        <div className="text-center py-20 text-gray-300">
          <div className="text-6xl mb-4">👥</div>
          <p className="text-lg font-medium">Noch keine Kontakte. Lege deinen ersten an!</p>
        </div>
      );
      return (
        <div className="overflow-x-auto rounded-2xl border bg-white">
          <table className="w-full">
            <thead>
              <tr className="border-b bg-gray-50">
                {["Name","Firma","Rolle","Ort","Priorität","Beziehung","Letzter Kontakt","Score",""].map(h => (
                  <th key={h} className="text-left text-xs font-semibold text-gray-400 uppercase tracking-wider px-4 py-3.5 whitespace-nowrap">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-50">
              {contacts.map(c => (
                <tr key={c.id} className="hover:bg-blue-50/50 transition-colors group">
                  <td className="px-4 py-3">
                    <p className="font-semibold text-gray-900 text-sm">{c.name}</p>
                    {c.email && <p className="text-xs text-gray-400 mt-0.5">{c.email}</p>}
                    {c.tags?.length>0 && (
                      <div className="flex flex-wrap gap-1 mt-1">
                        {c.tags.slice(0,2).map(t => <span key={t} className="bg-blue-50 text-brand-600 text-xs px-1.5 py-0.5 rounded-full">{t}</span>)}
                        {c.tags.length>2 && <span className="text-xs text-gray-400">+{c.tags.length-2}</span>}
                      </div>
                    )}
                  </td>
                  <td className="px-4 py-3 text-sm text-gray-700">{c.firma||"—"}</td>
                  <td className="px-4 py-3 text-sm text-gray-700">{c.rolle||"—"}</td>
                  <td className="px-4 py-3 text-xs text-gray-500">
                    {c.wohnort && <div>🏠 {c.wohnort}</div>}
                    {c.arbeitsort && <div>🏢 {c.arbeitsort}</div>}
                    {!c.wohnort && !c.arbeitsort && "—"}
                  </td>
                  <td className="px-4 py-3">
                    {c.prioritaet ? <span className={`text-xs px-2.5 py-1 rounded-full border font-semibold ${PRIO_STYLE[c.prioritaet]}`}>{c.prioritaet}</span> : "—"}
                  </td>
                  <td className="px-4 py-3"><Stars value={c.beziehungsstaerke||1} readonly={true} /></td>
                  <td className="px-4 py-3 text-sm text-gray-600 whitespace-nowrap">
                    {c.letzterKontakt?new Date(c.letzterKontakt).toLocaleDateString("de-DE"):"—"}
                  </td>
                  <td className="px-4 py-3"><ScoreBadge score={c.score||0} /></td>
                  <td className="px-4 py-3">
                    <div className="flex gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
                      <button onClick={() => onEdit(c)} className="text-blue-500 hover:text-blue-700 text-sm font-semibold">Bearbeiten</button>
                      <button onClick={() => onDelete(c.id)} className="text-red-400 hover:text-red-600 text-sm font-semibold">Löschen</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    };

    // ─── Card View ───────────────────────────────────────────────────────────
    const CardView = ({ contacts, onEdit, onDelete }) => {
      if (contacts.length===0) return (
        <div className="text-center py-20 text-gray-300">
          <div className="text-6xl mb-4">👥</div><p className="text-lg font-medium">Noch keine Kontakte.</p>
        </div>
      );
      return (
        <div className="grid gap-4" style={{gridTemplateColumns:"repeat(auto-fill, minmax(min(100%,280px), 1fr))"}}>
          {contacts.map(c => {
            const ds = c.letzterKontakt ? Math.floor((new Date()-new Date(c.letzterKontakt))/86400000) : null;
            return (
              <div key={c.id} className="bg-white border rounded-2xl p-5 hover:shadow-lg transition-all group cursor-pointer" onClick={() => onEdit(c)}>
                <div className="flex justify-between items-start mb-3">
                  <div className="flex-1 min-w-0 pr-2">
                    <h3 className="font-bold text-gray-900 text-base truncate">{c.name}</h3>
                    <p className="text-sm text-gray-500 truncate">{[c.rolle,c.firma].filter(Boolean).join(" · ")||"—"}</p>
                  </div>
                  {c.prioritaet && <span className={`text-xs px-2.5 py-1 rounded-full border font-semibold flex-shrink-0 ${PRIO_STYLE[c.prioritaet]}`}>{c.prioritaet}</span>}
                </div>
                <div className="flex items-center justify-between mb-3">
                  <Stars value={c.beziehungsstaerke||1} readonly={true} />
                  <ScoreBadge score={c.score||0} />
                </div>
                {(c.wohnort||c.arbeitsort) && (
                  <div className="flex gap-3 text-xs text-gray-400 mb-3">
                    {c.wohnort && <span>🏠 {c.wohnort}</span>}
                    {c.arbeitsort && <span>🏢 {c.arbeitsort}</span>}
                  </div>
                )}
                {c.tags?.length>0 && (
                  <div className="flex flex-wrap gap-1 mb-3">
                    {c.tags.slice(0,3).map(t => <span key={t} className="bg-indigo-50 text-indigo-600 text-xs px-2 py-0.5 rounded-full font-medium">{t}</span>)}
                    {c.tags.length>3 && <span className="text-xs text-gray-400">+{c.tags.length-3}</span>}
                  </div>
                )}
                {c.naechsteAktion && (
                  <div className="bg-amber-50 border border-amber-100 text-amber-700 text-xs rounded-xl px-3 py-2 mb-3">
                    📌 {c.naechsteAktion}
                  </div>
                )}
                <div className="flex items-center justify-between pt-3 border-t border-gray-50">
                  <p className="text-xs text-gray-400">
                    {ds!==null ? (ds===0?"Heute kontaktiert":`Vor ${ds} Tag${ds!==1?"en":""}`) : "Kein Kontakt vermerkt"}
                  </p>
                  <button onClick={e => {e.stopPropagation(); onDelete(c.id);}}
                    className="text-gray-300 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all text-xl">×</button>
                </div>
              </div>
            );
          })}
        </div>
      );
    };

    // ─── Map View ────────────────────────────────────────────────────────────
    const MapView = ({ contacts, onEdit }) => {
      const mapRef = useRef(null);
      const mapInstRef = useRef(null);
      const markersRef = useRef(null);
      const [status, setStatus] = useState("idle"); // idle | loading | done
      const [stats, setStats] = useState({total:0, mapped:0});

      // Init map once
      useEffect(() => {
        if (!mapRef.current || mapInstRef.current) return;

        // Clear any null (failed) geocoding cache entries so retries work
        contacts.forEach(c => {
          ["wohnort","arbeitsort"].forEach(f => {
            if (c[f]) { const k = c[f].trim().toLowerCase(); if (window._geoCache[k] === null) delete window._geoCache[k]; }
          });
        });
        _geoDelay = 0;

        mapInstRef.current = L.map(mapRef.current, {zoomControl:true}).setView([51.3, 10.5], 6);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution:'© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(mapInstRef.current);
        markersRef.current = L.layerGroup().addTo(mapInstRef.current);
        // Force Leaflet to recalculate container size after layout
        setTimeout(() => { if (mapInstRef.current) mapInstRef.current.invalidateSize(); }, 150);
        return () => {
          if (mapInstRef.current) { mapInstRef.current.remove(); mapInstRef.current = null; }
          markersRef.current = null;
        };
      }, []);

      // Update markers when contacts change
      useEffect(() => {
        if (!markersRef.current) return;
        markersRef.current.clearLayers();

        // Group contacts by city
        const groups = {};
        contacts.forEach(c => {
          if (c.wohnort?.trim()) {
            const k = c.wohnort.trim().toLowerCase();
            if (!groups[k]) groups[k] = {city:c.wohnort.trim(), wohnort:[], arbeitsort:[]};
            groups[k].wohnort.push(c);
          }
          if (c.arbeitsort?.trim()) {
            const k = c.arbeitsort.trim().toLowerCase();
            if (!groups[k]) groups[k] = {city:c.arbeitsort.trim(), wohnort:[], arbeitsort:[]};
            groups[k].arbeitsort.push(c);
          }
        });

        const cityList = Object.values(groups);
        if (cityList.length === 0) { setStatus("done"); setStats({total:0, mapped:0}); return; }

        setStatus("loading");
        let mapped = 0;

        (async () => {
          for (const grp of cityList) {
            const coords = await geocodeCity(grp.city);
            if (!coords || !markersRef.current) continue;
            mapped++;

            const allC = [
              ...grp.wohnort.map(c => ({...c, _loc:"🏠 Wohnort"})),
              ...grp.arbeitsort.map(c => ({...c, _loc:"🏢 Arbeitsort"}))
            ];
            const total = allC.length;

            // Pick color: multi=blue, wohnort=indigo, arbeitsort=amber
            const col = total>1 ? "#3b82f6" : grp.wohnort.length>0 ? "#6366f1" : "#f59e0b";
            const sz = total>1 ? 36 : 28;

            const icon = L.divIcon({
              html: `<div class="sm-marker" style="width:${sz}px;height:${sz}px;background:${col};font-size:${total>1?14:11}px;color:white;">${total>1?total:allC[0].name.charAt(0).toUpperCase()}</div>`,
              className:"", iconSize:[sz,sz], iconAnchor:[sz/2,sz/2]
            });

            const popupHtml = `
              <div style="font-family:-apple-system,sans-serif;min-width:190px">
                <strong style="font-size:14px;display:block;margin-bottom:8px;color:#111">${grp.city}</strong>
                ${allC.map(c => `
                  <div data-cid="${c.id}" style="padding:7px 0;border-top:1px solid #f1f5f9;cursor:pointer" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
                    <div style="font-weight:600;font-size:13px;color:#1e293b">${c.name}</div>
                    <div style="color:#64748b;font-size:11px">${c.rolle||""}${c.rolle&&c.firma?" · ":""}${c.firma||""}</div>
                    <div style="color:#94a3b8;font-size:10px;margin-top:2px">${c._loc}</div>
                  </div>`).join("")}
              </div>`;

            const marker = L.marker([coords.lat, coords.lon], {icon}).addTo(markersRef.current);
            marker.bindPopup(popupHtml, {maxWidth:260});
            marker.on("popupopen", () => {
              setTimeout(() => {
                document.querySelectorAll("[data-cid]").forEach(el => {
                  el.addEventListener("click", () => {
                    const c = allC.find(x => x.id===el.dataset.cid);
                    if (c) { mapInstRef.current?.closePopup(); onEdit(c); }
                  });
                });
              }, 80);
            });
          }
          setStatus("done");
          setStats({total:cityList.length, mapped});
        })();
      }, [contacts]);

      const hasLoc = contacts.some(c => c.wohnort||c.arbeitsort);

      return (
        <div className="space-y-4">
          <div className="bg-white border rounded-2xl p-4 flex flex-wrap gap-4 items-center justify-between">
            <div className="flex flex-wrap gap-4 text-sm items-center">
              <div className="flex items-center gap-2"><div className="w-4 h-4 rounded-full border-2 border-white shadow" style={{background:"#6366f1"}} /><span>Wohnort</span></div>
              <div className="flex items-center gap-2"><div className="w-4 h-4 rounded-full border-2 border-white shadow" style={{background:"#f59e0b"}} /><span>Arbeitsort</span></div>
              <div className="flex items-center gap-2"><div className="w-4 h-4 rounded-full border-2 border-white shadow" style={{background:"#3b82f6"}} /><span>Mehrere Kontakte</span></div>
            </div>
            <div className="text-xs text-gray-400">
              {status==="loading" && <span className="animate-pulse">🔍 Orte werden geocodiert…</span>}
              {status==="done" && stats.total>0 && <span>✓ {stats.mapped}/{stats.total} Orte gefunden</span>}
              {!hasLoc && <span className="text-amber-600 font-medium">⚠️ Noch keine Wohn-/Arbeitsorte eingetragen – über 📍 Ort im Kontakt ergänzen</span>}
            </div>
          </div>
          <div ref={mapRef} className="border rounded-2xl overflow-hidden shadow-sm" style={{height:"min(560px, calc(100vh - 180px))"}} />
        </div>
      );
    };

    // ─── Network / Knowledge Graph View ─────────────────────────────────────
    const NetworkView = ({ contacts, onEdit, adminSettings = {} }) => {
      const svgRef    = useRef(null);
      const wrapRef   = useRef(null);
      const simRef    = useRef(null);
      const nudgeRef  = useRef(null);
      const [tooltip, setTooltip] = useState(null);
      const [clusterMode, setClusterMode] = useState("standard");

      useEffect(() => {
        if (!svgRef.current || !wrapRef.current) return;
        if (contacts.length === 0) return;

        // ── 1. Helper functions — MUST be defined before simulation ──────────
        const nodeR     = d => d.type === "self" ? 30 : Math.max(13, 8 + (d.score || 0) / 8);
        // toOrdr-inspired flat color palette (dark→light teal = high→low priority)
        const prioColor = { self:"#1e4d5c", hoch:"#2d7a93", mittel:"#4fa3b8", niedrig:"#8ecbd9" };
        const nodeColor = d => prioColor[d.type==="self" ? "self" : (d.prioritaet || "niedrig")];
        const linkCol   = d => d.kind === "main" ? "#4a96ae" : "#a8cdd8";
        const linkDash  = d => d.kind === "peer" ? "5,4" : null;
        const linkW     = d => d.kind === "main" ? Math.max(1.5, (d.weight||1) * 1.8) : 1;

        // ── 2. Data ───────────────────────────────────────────────────────────
        const nodes = [
          { id:"__julian__", name:(adminSettings.name||"Julian")+" (Du)", type:"self", score:100, prioritaet:"self" },
          ...contacts.map(c => ({ ...c, type:"contact" }))
        ];
        const links = [];
        const seen  = new Set();
        contacts.forEach(c => {
          links.push({ source:"__julian__", target:c.id, weight:c.beziehungsstaerke||1, kind:"main", prioritaet:c.prioritaet||"niedrig" });
          (c.verbindungen||[]).forEach(v => {
            if (!contacts.find(x => x.id===v.kontaktId)) return;
            const k = [c.id,v.kontaktId].sort().join("|||");
            if (!seen.has(k)) { seen.add(k); links.push({ source:c.id, target:v.kontaktId, weight:1, kind:"peer", typ:v.typ||"kennt" }); }
          });
        });

        // ── 3. SVG canvas ─────────────────────────────────────────────────────
        const W = Math.max(wrapRef.current.clientWidth || 0, 400);
        const H = 580;
        const svg = d3.select(svgRef.current).attr("width", W).attr("height", H);
        svg.selectAll("*").remove();
        const defs = svg.append("defs");

        // ── Scientific background: clean fill + subtle orthogonal grid ──────
        svg.append("rect").attr("width",W).attr("height",H).attr("fill","#f7fafc");
        const gridStep = 44;
        const gridG = svg.append("g").attr("pointer-events","none");
        for (let x = gridStep; x < W; x += gridStep)
          gridG.append("line").attr("x1",x).attr("y1",0).attr("x2",x).attr("y2",H)
            .attr("stroke","#dde8ec").attr("stroke-width","0.6");
        for (let y = gridStep; y < H; y += gridStep)
          gridG.append("line").attr("x1",0).attr("y1",y).attr("x2",W).attr("y2",y)
            .attr("stroke","#dde8ec").attr("stroke-width","0.6");

        // ── 4. Zoom & pan ────────────────────────────────────────────────────
        const g    = svg.append("g");
        const zoom = d3.zoom().scaleExtent([0.1, 5]).on("zoom", ev => g.attr("transform", ev.transform));
        svg.call(zoom).on("dblclick.zoom", null);
        const initScale = Math.min(1.1, Math.max(0.45, 2.8 / Math.sqrt(contacts.length + 1)));
        svg.call(zoom.transform, d3.zoomIdentity.translate(W/2, H/2).scale(initScale));

        // ── 5. Cluster mode setup — compute groupings before simulation ────────
        let clusterAux = {};
        if (clusterMode === "arbeitgeber") {
          const firms = [...new Set(nodes.filter(n=>n.type!=="self").map(n=>n.firma||"—"))];
          const fPos = {};
          firms.forEach((f,i) => {
            const angle = (i/firms.length)*2*Math.PI - Math.PI/2;
            fPos[f] = { x: Math.cos(angle)*220, y: Math.sin(angle)*180 };
          });
          clusterAux = { firms, fPos };
        } else if (clusterMode === "geo") {
          const geoPos = {};
          nodes.forEach(n => {
            if (n.type==="self") return;
            const city = n.wohnort || n.arbeitsort;
            if (!city) return;
            const coord = window._geoCache[city.trim().toLowerCase()];
            if (coord) geoPos[n.id] = coord;
          });
          if (adminSettings.wohnort) {
            const coord = window._geoCache[adminSettings.wohnort.trim().toLowerCase()];
            if (coord) geoPos["__julian__"] = coord;
          }
          clusterAux = { geoPos, hasData: Object.keys(geoPos).length > 0 };
        }

        // ── 5b. Force simulation — mode-aware ────────────────────────────────
        const sim = d3.forceSimulation(nodes)
          .alphaDecay(0.010).alphaMin(0.001).velocityDecay(0.22);

        if (clusterMode === "standard") {
          sim
            .force("link",   d3.forceLink(links).id(d=>d.id).distance(d=>d.kind==="main"?Math.max(110,210-(d.weight||1)*18):130).strength(0.45))
            .force("charge", d3.forceManyBody().strength(-620).distanceMax(700))
            .force("collide",d3.forceCollide().radius(d=>nodeR(d)+14).strength(0.85))
            .force("center", d3.forceCenter(0,0).strength(0.04));
        } else if (clusterMode === "score") {
          sim
            .force("radial", d3.forceRadial(d=>d.type==="self"?0:Math.max(70,(100-(d.score||0))*2.5),0,0).strength(0.55))
            .force("charge", d3.forceManyBody().strength(-180))
            .force("collide",d3.forceCollide().radius(d=>nodeR(d)+12).strength(0.9))
            .force("link",   d3.forceLink(links).id(d=>d.id).distance(120).strength(0.08));
        } else if (clusterMode === "arbeitgeber") {
          const { fPos } = clusterAux;
          sim
            .force("x",      d3.forceX(d=>d.type==="self"?0:(fPos[d.firma||"—"]?.x||0)).strength(0.6))
            .force("y",      d3.forceY(d=>d.type==="self"?0:(fPos[d.firma||"—"]?.y||0)).strength(0.6))
            .force("charge", d3.forceManyBody().strength(-100))
            .force("collide",d3.forceCollide().radius(d=>nodeR(d)+10).strength(0.9))
            .force("link",   d3.forceLink(links).id(d=>d.id).distance(70).strength(0.04));
        } else if (clusterMode === "prioritaet") {
          const pY = { hoch:-200, mittel:0, niedrig:200 };
          const pX = { hoch:-50, mittel:0, niedrig:50 };
          sim
            .force("y",      d3.forceY(d=>d.type==="self"?0:(pY[d.prioritaet||"niedrig"]||0)).strength(0.55))
            .force("x",      d3.forceX(d=>d.type==="self"?0:(pX[d.prioritaet||"niedrig"]||0)).strength(0.1))
            .force("charge", d3.forceManyBody().strength(-150))
            .force("collide",d3.forceCollide().radius(d=>nodeR(d)+12).strength(0.9))
            .force("link",   d3.forceLink(links).id(d=>d.id).distance(80).strength(0.06));
        } else if (clusterMode === "beziehung") {
          sim
            .force("radial", d3.forceRadial(d=>d.type==="self"?0:Math.max(60,(6-(d.beziehungsstaerke||1))*70),0,0).strength(0.65))
            .force("charge", d3.forceManyBody().strength(-200))
            .force("collide",d3.forceCollide().radius(d=>nodeR(d)+12).strength(0.9))
            .force("link",   d3.forceLink(links).id(d=>d.id).distance(100).strength(0.10));
        } else if (clusterMode === "geo") {
          const { geoPos, hasData } = clusterAux;
          if (hasData) {
            const allC = Object.values(geoPos);
            const lats = allC.map(c=>c.lat), lons = allC.map(c=>c.lon);
            const latMid=(Math.max(...lats)+Math.min(...lats))/2, lonMid=(Math.max(...lons)+Math.min(...lons))/2;
            const latRange=Math.max(Math.max(...lats)-Math.min(...lats),0.5), lonRange=Math.max(Math.max(...lons)-Math.min(...lons),0.5);
            const sc = Math.min(300/lonRange, 240/latRange);
            sim
              .force("x",      d3.forceX(d=>{const p=geoPos[d.id];return p?(p.lon-lonMid)*sc:0;}).strength(d=>d.type==="self"?1:(geoPos[d.id]?0.7:0.03)))
              .force("y",      d3.forceY(d=>{const p=geoPos[d.id];return p?-(p.lat-latMid)*sc:0;}).strength(d=>d.type==="self"?1:(geoPos[d.id]?0.7:0.03)))
              .force("charge", d3.forceManyBody().strength(-120))
              .force("collide",d3.forceCollide().radius(d=>nodeR(d)+10).strength(0.9))
              .force("link",   d3.forceLink(links).id(d=>d.id).distance(80).strength(0.03));
          } else {
            // No geo data yet — fall back to standard
            sim
              .force("link",   d3.forceLink(links).id(d=>d.id).distance(d=>d.kind==="main"?Math.max(110,210-(d.weight||1)*18):130).strength(0.45))
              .force("charge", d3.forceManyBody().strength(-620).distanceMax(700))
              .force("collide",d3.forceCollide().radius(d=>nodeR(d)+14).strength(0.85))
              .force("center", d3.forceCenter(0,0).strength(0.04));
          }
        }

        simRef.current = sim;

        // Pin Julian at origin (all modes)
        const jul = nodes.find(n => n.id==="__julian__");
        if (jul) { jul.x=0; jul.y=0; jul.fx=0; jul.fy=0; }

        // ── 6. Links ─────────────────────────────────────────────────────────
        const linkG  = g.append("g");
        const linkEl = linkG.selectAll("line").data(links).join("line")
          .attr("stroke",          linkCol)
          .attr("stroke-width",    linkW)
          .attr("stroke-linecap", "square")
          .attr("stroke-dasharray", linkDash)
          .attr("stroke-opacity",  d => d.kind==="main" ? 0.58 : 0.35);

        // Peer link type labels
        const peerLinks  = links.filter(l => l.kind==="peer");
        const peerLabelG = g.append("g");
        const peerLabels = peerLabelG.selectAll("text").data(peerLinks).join("text")
          .attr("text-anchor","middle").attr("font-size","8.5").attr("fill","#6899a8")
          .attr("pointer-events","none").attr("font-family","'SF Mono',SFMono-Regular,Consolas,monospace")
          .attr("letter-spacing","0.02em")
          .text(d => d.typ || "");

        // ── 6b. Cluster visual guides (scientific style) ──────────────────────
        if (clusterMode === "prioritaet") {
          const bands = [
            {label:"— HOCH —",y:-215,col:"#2d7a93"},
            {label:"— MITTEL —",y:5,col:"#4fa3b8"},
            {label:"— NIEDRIG —",y:215,col:"#8ecbd9"}
          ];
          g.append("g").selectAll("text").data(bands).join("text")
            .attr("x",0).attr("y",d=>d.y).attr("text-anchor","middle")
            .attr("font-size","10.5").attr("font-weight","700").attr("fill",d=>d.col).attr("opacity","0.55")
            .attr("pointer-events","none").attr("letter-spacing","0.12em")
            .attr("font-family","'SF Mono',SFMono-Regular,Consolas,monospace")
            .text(d=>d.label);
          // Thin horizontal separator lines
          [-170,80].forEach(y =>
            g.append("line").attr("x1",-320).attr("y1",y).attr("x2",320).attr("y2",y)
              .attr("stroke","#c5dfe8").attr("stroke-width","0.7").attr("stroke-dasharray","4,5").attr("opacity","0.5")
          );
        } else if (clusterMode === "arbeitgeber" && clusterAux.firms) {
          const lblData = clusterAux.firms.map((f,i)=>{
            const angle=(i/clusterAux.firms.length)*2*Math.PI-Math.PI/2;
            return {label:f, x:Math.cos(angle)*268, y:Math.sin(angle)*225};
          });
          g.append("g").selectAll("text").data(lblData).join("text")
            .attr("x",d=>d.x).attr("y",d=>d.y).attr("text-anchor","middle")
            .attr("font-size","10").attr("font-weight","700").attr("fill","#5baec3").attr("opacity","0.7")
            .attr("pointer-events","none").attr("letter-spacing","0.06em")
            .attr("font-family","'SF Mono',SFMono-Regular,Consolas,monospace")
            .text(d=>d.label.length>16?d.label.slice(0,15)+"…":d.label);
        } else if (clusterMode === "score" || clusterMode === "beziehung") {
          const rings = clusterMode==="score"
            ? [{r:72,lbl:"Score ≥ 90"},{r:148,lbl:"Score 60–90"},{r:218,lbl:"Score < 60"}]
            : [{r:60,lbl:"Stärke 5"},{r:130,lbl:"Stärke 3"},{r:200,lbl:"Stärke 1"}];
          const rG = g.append("g");
          rings.forEach(ring=>{
            rG.append("circle").attr("r",ring.r).attr("fill","none")
              .attr("stroke","#b2dde8").attr("stroke-dasharray","4,6").attr("stroke-width","1");
            rG.append("text").attr("x",ring.r+7).attr("y",4)
              .attr("font-size","9.5").attr("fill","#6899a8").attr("opacity","0.85")
              .attr("pointer-events","none")
              .attr("font-family","'SF Mono',SFMono-Regular,Consolas,monospace")
              .text(ring.lbl);
          });
        }

        // ── 7. Nodes ──────────────────────────────────────────────────────────
        const nodeG   = g.append("g");
        const nodeGrp = nodeG.selectAll("g").data(nodes).join("g")
          .attr("cursor", d => d.type==="self" ? "grab" : "pointer")
          .call(
            d3.drag()
              .on("start", (ev,d) => { if(!ev.active) sim.alphaTarget(0.18).restart(); d.fx=d.x; d.fy=d.y; })
              .on("drag",  (ev,d) => { d.fx=ev.x; d.fy=ev.y; })
              .on("end",   (ev,d) => {
                if(!ev.active) sim.alphaTarget(0);
                if(d.id!=="__julian__") { d.fx=null; d.fy=null; }
              })
          )
          .on("click",     (ev,d) => { if(d.type!=="self") { ev.stopPropagation(); onEdit(d); } })
          .on("mouseover", function(ev,d) {
            d3.select(this).select("circle.mc")
              .transition().duration(160).ease(d3.easeCubicOut)
              .attr("r", nodeR(d) * 1.18);
            setTooltip({ x:ev.pageX, y:ev.pageY, d });
          })
          .on("mousemove", (ev) => setTooltip(t => t ? { ...t, x:ev.pageX, y:ev.pageY } : null))
          .on("mouseout",  function(ev,d) {
            d3.select(this).select("circle.mc")
              .transition().duration(200).ease(d3.easeCubicOut)
              .attr("r", nodeR(d));
            setTooltip(null);
          });

        // Scientific indicator ring for Julian (dashed, precision-style)
        nodeGrp.filter(d => d.type==="self").append("circle")
          .attr("r", d => nodeR(d) + 10)
          .attr("fill","none")
          .attr("stroke","#1e4d5c")
          .attr("stroke-width","1")
          .attr("stroke-dasharray","3,5")
          .attr("opacity","0.4");

        // Main flat circle (pure 2D, no gradient, no shadow/filter)
        nodeGrp.append("circle")
          .attr("class","mc")
          .attr("r",      nodeR)
          .attr("fill",   nodeColor)
          .attr("stroke","rgba(255,255,255,0.92)")
          .attr("stroke-width","1.5");

        // Initials text
        nodeGrp.append("text")
          .attr("text-anchor","middle")
          .attr("y","0.38em")
          .attr("font-weight","700").attr("fill","white")
          .attr("font-size", d => d.type==="self" ? 14 : 11)
          .attr("pointer-events","none")
          .attr("font-family","-apple-system,BlinkMacSystemFont,sans-serif")
          .text(d => d.type==="self" ? "Du" : (d.name||"").split(" ").map(p => p[0]||"").join("").toUpperCase().slice(0,2));

        // Name label
        nodeGrp.append("text")
          .attr("text-anchor","middle")
          .attr("y", d => nodeR(d) + 15)
          .attr("font-size","11").attr("font-weight","600")
          .attr("fill","#1e4d5c").attr("pointer-events","none")
          .attr("font-family","-apple-system,BlinkMacSystemFont,sans-serif")
          .attr("letter-spacing","0.01em")
          .text(d => d.name.length > 17 ? d.name.slice(0,16)+"…" : d.name);

        // Firma sub-label
        nodeGrp.filter(d => d.type!=="self" && !!d.firma).append("text")
          .attr("text-anchor","middle")
          .attr("y", d => nodeR(d) + 26)
          .attr("font-size","8.5").attr("fill","#6899a8").attr("pointer-events","none")
          .attr("font-family","-apple-system,sans-serif")
          .text(d => (d.firma||"").length > 15 ? (d.firma||"").slice(0,14)+"…" : (d.firma||""));

        // ── 8. Tick ───────────────────────────────────────────────────────────
        sim.on("tick", () => {
          linkEl
            .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
          peerLabels
            .attr("x", d => (d.source.x + d.target.x) / 2)
            .attr("y", d => (d.source.y + d.target.y) / 2 - 4);
          nodeGrp.attr("transform", d => `translate(${d.x||0},${d.y||0})`);
        });

        // ── 9. Gentle periodic nudge for organic "breathing" movement ─────────
        nudgeRef.current = setInterval(() => {
          if (simRef.current) simRef.current.alpha(0.035).restart();
        }, 9000);

        return () => {
          sim.stop();
          if (nudgeRef.current) clearInterval(nudgeRef.current);
        };
      }, [contacts, clusterMode, adminSettings]);

      const CLUSTER_LABELS = {
        standard:    "Knotengröße = Score · Linienstärke = Beziehung",
        score:       "Nähe zu Julian = höherer Score / mehr Relevanz",
        arbeitgeber: "Knoten nach Arbeitgeber / Firma geclustert",
        prioritaet:  "Oben = Hoch · Mitte = Mittel · Unten = Niedrig",
        beziehung:   "Nähe zu Julian = stärkere persönliche Beziehung",
        geo:         "Geografische Anordnung nach Wohnort (Kartenansicht zuerst öffnen für Geodaten)",
      };

      return (
        <div className="space-y-4">
          {/* Controls bar */}
          <div className="bg-white p-4 flex flex-wrap gap-x-5 gap-y-3 items-center text-sm" style={{border:"1px solid #c5dfe8",borderRadius:"6px"}}>
            {/* Cluster selector */}
            <div className="flex items-center gap-2.5">
              <span className="font-semibold whitespace-nowrap text-xs uppercase tracking-wide" style={{color:"#1e4d5c"}}>Layout</span>
              <select value={clusterMode} onChange={e => setClusterMode(e.target.value)}
                className="border rounded-lg px-3 py-1.5 text-xs outline-none focus:ring-2 focus:ring-brand-400 bg-white font-medium" style={{borderColor:"#b2dde8",color:"#1e4d5c"}}>
                <option value="standard">Force-directed (Standard)</option>
                <option value="score">Radial — Relevanz / Score</option>
                <option value="prioritaet">Layered — Priorität</option>
                <option value="arbeitgeber">Cluster — Arbeitgeber</option>
                <option value="beziehung">Radial — Beziehungsstärke</option>
                <option value="geo">Spatial — Räumlicher Abstand</option>
              </select>
            </div>
            {/* Mode info */}
            <span className="text-xs" style={{color:"#6899a8"}}>{CLUSTER_LABELS[clusterMode]}</span>
            {/* Legend dots */}
            <div className="flex gap-x-4 gap-y-1 flex-wrap ml-auto">
              {[["#1e4d5c","Julian (Du)"],["#2d7a93","Prio Hoch"],["#4fa3b8","Prio Mittel"],["#8ecbd9","Prio Niedrig"]].map(([c,l]) => (
                <div key={l} className="flex items-center gap-1.5">
                  <div className="flex-shrink-0" style={{width:"12px",height:"12px",borderRadius:"50%",background:c}} />
                  <span className="text-xs" style={{color:"#4a7a8a"}}>{l}</span>
                </div>
              ))}
              <div className="flex items-center gap-1.5 ml-2 pl-2" style={{borderLeft:"1px solid #c5dfe8"}}>
                <svg width="22" height="8"><line x1="0" y1="4" x2="22" y2="4" stroke="#4a96ae" strokeWidth="1.5"/></svg>
                <span className="text-xs" style={{color:"#4a7a8a"}}>direkt</span>
                <svg width="22" height="8"><line x1="0" y1="4" x2="22" y2="4" stroke="#a8cdd8" strokeWidth="1" strokeDasharray="4,3"/></svg>
                <span className="text-xs" style={{color:"#4a7a8a"}}>indirekt</span>
              </div>
            </div>
          </div>

          {/* Graph canvas */}
          <div ref={wrapRef} className="overflow-hidden relative" style={{height:"min(580px, calc(100vh - 190px))", background:"#f7fafc", border:"1px solid #c5dfe8", borderRadius:"6px"}}>
            {contacts.length === 0 && (
              <div className="absolute inset-0 flex items-center justify-center" style={{color:"#94a3b8"}}>
                <div className="text-center">
                  <div className="text-6xl mb-3">🕸️</div>
                  <p className="font-medium">Füge Kontakte hinzu, um das Netzwerk zu sehen</p>
                </div>
              </div>
            )}
            <svg ref={svgRef} style={{display:"block", width:"100%", height:"100%"}} />
          </div>

          {/* Tooltip */}
          {tooltip && tooltip.d && (
            <div className="d3-tooltip" style={{left:tooltip.x+16, top:tooltip.y-85, maxWidth:"220px"}}>
              <p className="font-bold text-gray-900 text-sm leading-tight">{tooltip.d.name}</p>
              {tooltip.d.type !== "self" ? (
                <>
                  {(tooltip.d.rolle || tooltip.d.firma) &&
                    <p className="text-gray-500 text-xs mt-1">{[tooltip.d.rolle, tooltip.d.firma].filter(Boolean).join(" · ")}</p>}
                  <div className="flex gap-3 mt-1.5 flex-wrap">
                    {tooltip.d.prioritaet && <span className="text-xs font-semibold" style={{color: tooltip.d.prioritaet==="hoch"?"#2d7a93":tooltip.d.prioritaet==="mittel"?"#4fa3b8":"#8ecbd9"}}>◉ {tooltip.d.prioritaet}</span>}
                    <span className="text-xs text-gray-400">Score: {tooltip.d.score||0}</span>
                    {(tooltip.d.beziehungsstaerke||0) > 0 && <span className="text-xs" style={{color:"#4fa3b8"}}>{"★".repeat(tooltip.d.beziehungsstaerke||0)}</span>}
                  </div>
                  {(tooltip.d.wohnort||tooltip.d.arbeitsort) &&
                    <p className="text-gray-400 text-xs mt-1.5">{[tooltip.d.wohnort&&`🏠 ${tooltip.d.wohnort}`, tooltip.d.arbeitsort&&`🏢 ${tooltip.d.arbeitsort}`].filter(Boolean).join("  ")}</p>}
                  {(tooltip.d.verbindungen||[]).length>0 &&
                    <p className="text-xs mt-1" style={{color:"#4fa3b8"}}>↔ {tooltip.d.verbindungen.length} Verbindung{tooltip.d.verbindungen.length!==1?"en":""}</p>}
                </>
              ) : (
                <p className="text-gray-400 text-xs mt-0.5">Du bist der Mittelpunkt des Netzwerks</p>
              )}
            </div>
          )}
        </div>
      );
    };

    // ─── SmartQuery helpers ───────────────────────────────────────────────────
    const SQ_STOPWORDS = new Set([
      "ich","bin","nach","und","oder","der","die","das","ein","eine","ist","zu","für",
      "mit","von","bei","in","im","am","an","auf","aus","den","des","dem","ein","einer",
      "einen","eines","als","so","wie","ob","ob","wenn","dass","weil","aber","doch",
      "auch","noch","schon","sehr","mehr","nur","mal","kann","muss","will","brauche",
      "fahre","suche","habe","hatte","sind","war","wird","werden","haben","gibt","bitte",
      "mir","mich","mein","meine","meinem","meinen","meiner","sie","er","es","wir","ihr"
    ]);

    const tokenize = (text) =>
      text.toLowerCase()
        .replace(/[^a-züöäß0-9\s\-]/g, " ")
        .split(/\s+/)
        .filter(t => t.length > 2 && !SQ_STOPWORDS.has(t));

    const runQuery = (queryText, contacts) => {
      if (!queryText.trim() || contacts.length === 0) return [];
      const tokens = tokenize(queryText);
      if (tokens.length === 0) return [];

      return contacts.map(c => {
        const fields = [
          { weight: 3, text: (c.tags || []).join(" ") },
          { weight: 2.5, text: c.rolle || "" },
          { weight: 2, text: c.firma || "" },
          { weight: 2, text: c.wohnort || "" },
          { weight: 1.5, text: c.arbeitsort || "" },
          { weight: 1.5, text: c.notizen || "" },
          { weight: 1, text: c.name || "" },
          { weight: 1, text: (c.kontakthistorie || []).map(e => e.text).join(" ") },
        ];
        const reasons = [];
        let score = 0;

        tokens.forEach(token => {
          fields.forEach(({ weight, text }) => {
            if (text.toLowerCase().includes(token)) {
              score += weight;
            }
          });
          // Collect human-readable reason hits
          if ((c.tags || []).some(t => t.toLowerCase().includes(token)))
            reasons.push(`Tag: ${c.tags.find(t => t.toLowerCase().includes(token))}`);
          else if ((c.rolle||"").toLowerCase().includes(token))
            reasons.push(`Rolle: ${c.rolle}`);
          else if ((c.firma||"").toLowerCase().includes(token))
            reasons.push(`Firma: ${c.firma}`);
          else if ((c.wohnort||"").toLowerCase().includes(token))
            reasons.push(`Wohnort: ${c.wohnort}`);
          else if ((c.arbeitsort||"").toLowerCase().includes(token))
            reasons.push(`Arbeitsort: ${c.arbeitsort}`);
          else if ((c.notizen||"").toLowerCase().includes(token))
            reasons.push(`Notiz-Treffer`);
        });

        // Boost by relationship strength and priority
        const prioBoost = { hoch: 1.4, mittel: 1.1, niedrig: 1.0 };
        score *= (prioBoost[c.prioritaet] || 1.0);
        score *= (1 + (c.beziehungsstaerke || 1) * 0.08);

        const uniqueReasons = [...new Set(reasons)].slice(0, 3);
        return { contact: c, score: Math.round(score * 10) / 10, reasons: uniqueReasons };
      })
      .filter(r => r.score > 0)
      .sort((a, b) => b.score - a.score)
      .slice(0, 10);
    };

    const getContextualAnswer = (queryText, results) => {
      const qt = queryText.toLowerCase();
      const n = results.length;
      const top = results.slice(0, 3).map(r => r.contact.name);
      const topStr = top.length === 1 ? top[0] : top.length === 2 ? `${top[0]} und ${top[1]}` : `${top[0]}, ${top[1]} und ${top[2]}`;

      if (!n) {
        return "Zu dieser Anfrage konnten keine passenden Kontakte gefunden werden. Versuche es mit anderen Stichworten – zum Beispiel Branche, Thema, Stadt oder Rolle.";
      }

      // ── Travel intent ────────────────────────────────────────────────────────
      const cityMatch = qt.match(/nach\s+([a-züöäß\-]+)/i) ||
                        qt.match(/in\s+([a-züöäß]{4,})/i) ||
                        qt.match(/([a-züöäß]{4,})\s+(?:besuch|treffe|reise)/i);
      if (cityMatch) {
        const city = cityMatch[1];
        const cap = city.charAt(0).toUpperCase() + city.slice(1);
        const local = results.filter(r =>
          (r.contact.wohnort||"").toLowerCase().includes(city.toLowerCase()) ||
          (r.contact.arbeitsort||"").toLowerCase().includes(city.toLowerCase())
        );
        const elsewhere = results.filter(r => !local.includes(r));
        let text = `Ein Besuch in ${cap} ist eine gute Gelegenheit, dein Netzwerk dort gezielt zu aktivieren. `;
